<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Croma · Análisis</title>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data: https:; connect-src https://stock-api.croma-app.com.ar;">
  <meta name="referrer" content="no-referrer">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="croma-ds.css?v=20260714-1">
  <style>
    /* --black, --white, --gray-100..800 y --accent ya vienen de croma-ds.css (valores
       idénticos, una sola fuente de verdad). Acá solo lo que croma-ds.css no define:
       colores semánticos propios de Análisis (mismos valores que --success, --danger
       y --warning de la DS, con otro nombre porque ya se usan así en todo el archivo)
       y los colores de sucursal existentes (se mantienen tal cual, no los de
       croma-ds.css, ver BRIEF/decisión 2026-07-13). */
    :root {
      --accent-s:#fde8e6;
      --sold:#16a34a; --sold-s:#dcfce7;
      --risk:#dc2626; --risk-s:#fee2e2;
      --amber:#d97706; --amber-s:#fef3c7;
      --violet:#7c3aed; --violet-s:#ede9fe;
      --teal:#0891b2; --teal-s:#cffafe;
      --suc-01:#185FA5; --suc-01-s:#E6F1FB;
      --suc-05:#0F6E56; --suc-05-s:#E1F5EE;
      --suc-09:#B45309; --suc-09-s:#FEF3C7;
      --suc-10:#9B2563; --suc-10-s:#FCE7F3;
      --suc-12:#534AB7; --suc-12-s:#EEEDFE;
      --suc-14:#3B6D11; --suc-14-s:#EAF3DE;
      --font-d: var(--font-display);
      --font-b: var(--font-body);
      --r: var(--radius-lg);
      --sh:0 1px 3px rgba(0,0,0,.08),0 4px 16px -4px rgba(0,0,0,.08);
    }
    a:focus-visible, button:focus-visible, input:focus-visible, select:focus-visible, [tabindex]:focus-visible {
      outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 6px;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{-webkit-text-size-adjust:100%}
    body{font-family:var(--font-b);background:var(--gray-50);color:var(--black);
      line-height:1.45;font-variant-numeric:tabular-nums;-webkit-font-smoothing:antialiased;min-height:100vh}

    #authCheck{position:fixed;inset:0;background:var(--black);display:flex;align-items:center;
      justify-content:center;flex-direction:column;gap:16px;z-index:9999}
    #authCheck p{color:var(--gray-400);font-size:13px}
    .spinner{width:28px;height:28px;border:2px solid rgba(255,255,255,.15);
      border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}

    .topbar{position:sticky;top:0;z-index:100;display:flex;align-items:center;gap:1.25rem;
      padding:0 2.25rem;height:64px;
      background:rgba(13,13,13,.96);backdrop-filter:blur(14px);
      box-shadow:0 6px 24px rgba(0,0,0,.20)}
    .brand{display:flex;align-items:center;gap:8px;min-width:max-content}
    .brand-tridente{height:26px;width:auto;display:block}
    .brand-logo{font-family:var(--font-d);font-size:26px;letter-spacing:3px;line-height:1;color:#fff}
    .brand-divider{color:var(--gray-600);font-size:14px}
    .brand-section{font-size:11px;font-weight:500;letter-spacing:3px;color:var(--gray-400);
      text-transform:uppercase;padding:3px 9px;border:1px solid rgba(255,255,255,.12);border-radius:999px}
    .top-actions{margin-left:auto;display:flex;align-items:center;gap:8px}
    /* Namespaced a proposito (topbar-icon-btn, no .btn-icon): .btn-icon ya es una clase
       oficial de croma-ds.css (sizing 40x40 sobre fondo claro) — esta variante es solo
       para la topbar oscura y no debe pisar la real al reutilizarla en Tiempo real. */
    .topbar-icon-btn{width:38px;height:38px;display:flex;align-items:center;justify-content:center;
      border:1px solid rgba(255,255,255,.12);border-radius:12px;
      background:rgba(255,255,255,.04);color:var(--gray-400);cursor:pointer;transition:.15s}
    .topbar-icon-btn:hover{color:#fff;border-color:#555;background:rgba(255,255,255,.11);transform:translateY(-1px)}
    .sesion-chip{display:flex;align-items:center;gap:8px;padding:5px 10px 5px 12px;
      background:rgba(255,255,255,.09);border:1px solid rgba(255,255,255,.18);border-radius:20px}
    .sesion-nombre{font-size:12px;font-weight:600;color:#e8e8e2;white-space:nowrap;letter-spacing:.2px}
    .sesion-logout{width:24px;height:24px;border-radius:50%;background:rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.15);color:#888;cursor:pointer;display:flex;
      align-items:center;justify-content:center;transition:.15s}
    .sesion-logout:hover{background:#dc2626;border-color:#dc2626;color:#fff}

    .wrap{max-width:1300px;margin:0 auto;padding:20px 20px 80px}

    /* Filter bar */
    .fbar{background:var(--white);border:1px solid var(--gray-100);border-radius:var(--r);
      padding:12px 16px;box-shadow:var(--sh);margin-bottom:14px;
      display:flex;align-items:flex-end;gap:12px;flex-wrap:wrap}
    .fc{display:flex;flex-direction:column;gap:3px}
    .fc label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--gray-400)}
    .fc input,.fc select{font:inherit;font-size:13px;font-weight:500;
      border:1px solid var(--gray-200);border-radius:8px;padding:6px 10px;
      background:var(--gray-50);color:var(--black)}
    .fc input:focus,.fc select:focus{outline:2px solid var(--violet);outline-offset:1px}
    .fbar-end{margin-left:auto;display:flex;align-items:center;gap:10px;flex-wrap:wrap;padding-bottom:2px}
    .fname{font-size:11.5px;color:var(--gray-400)}
    .fname b{color:var(--black);font-weight:600}

    /* Tiempo real — periodo, tablas, paginacion, chips */
    .rt-periodo-label{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:600;color:var(--gray-400)}
    .rt-periodo-input{padding:5px 8px!important;font-size:12.5px!important}
    /* .rt-kpi se aplica siempre junto con .card (croma-ds.css) -- .card ya da fondo,
       borde, radio y sombra reales del DS; acá solo el layout interno (icono+label+valor). */
    .rt-kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:var(--space-3);margin-bottom:var(--space-4)}
    .rt-kpi{display:flex;flex-direction:column;gap:6px;padding:var(--space-4)}
    .rt-kpi-icon{width:32px;height:32px;border-radius:var(--radius-md);display:grid;place-items:center;
      background:var(--gray-100);color:var(--gray-600);flex:none}
    .rt-kpi-icon svg{width:16px;height:16px}
    .rt-kpi-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--gray-400)}
    .rt-kpi-valor{font-family:var(--font-display);font-size:26px;letter-spacing:-.01em;line-height:1}
    .rt-kpi-delta{display:inline-flex;align-items:center;gap:3px;font-size:11.5px;font-weight:600}
    .rt-kpi-delta svg{width:11px;height:11px;flex:none}
    .rt-kpi-delta.up{color:var(--success)}
    .rt-kpi-delta.down{color:var(--danger)}
    .rt-kpi-delta.flat{color:var(--gray-400);font-weight:500}
    .rt-kpi-delta .arrow-up{transform:rotate(180deg)}
    .rt-table-wrap{overflow-x:auto;background:var(--white);border:1px solid var(--gray-100);
      border-radius:16px;box-shadow:var(--shadow-sm)}
    table.rt-table{width:100%;border-collapse:collapse;font-size:13px}
    table.rt-table th{text-align:left;font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;
      color:var(--gray-400);padding:9px 12px;border-bottom:1px solid var(--gray-100);white-space:nowrap}
    table.rt-table td{padding:9px 12px;border-bottom:1px solid var(--gray-50);white-space:nowrap}
    table.rt-table tbody tr.rt-row-click{cursor:pointer}
    table.rt-table tbody tr.rt-row-click:hover{background:var(--gray-50)}
    .rt-filtro-chip{display:inline-flex;align-items:center;gap:6px;background:var(--accent-s);color:var(--accent);
      font-size:12.5px;font-weight:600;padding:5px 10px;border-radius:99px;margin-bottom:12px}
    .rt-filtro-chip-icon{display:inline-flex}
    .rt-filtro-chip button{background:none;border:none;cursor:pointer;color:inherit;padding:0 2px;
      display:inline-flex;align-items:center}
    .rt-pagination{display:flex;align-items:center;gap:10px;justify-content:flex-end;padding:10px 12px;font-size:12.5px;color:var(--gray-400)}
    .rt-progress{font-size:12.5px;color:var(--gray-400);display:flex;align-items:center;gap:8px;margin:8px 0}
    .rt-buscador-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px}
    .rt-buscador-row input,.rt-buscador-row select{font:inherit;font-size:13px;border:1px solid var(--gray-200);
      border-radius:8px;padding:7px 11px;background:var(--gray-50)}
    /* Titulos de seccion dentro de una vista RT (ej. "Ventas y stock por sucursal",
       "Por talle") -- clase usada en varias vistas pero sin regla propia hasta ahora,
       caia al h3/h4 por defecto del navegador. */
    .rt-subtitulo{font-family:var(--font-display);font-size:16px;letter-spacing:.5px;
      color:var(--black);margin:var(--space-5) 0 var(--space-2)}
    .rt-subtitulo:first-child{margin-top:0}
    .rt-filtros-titulo{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:700;
      text-transform:uppercase;letter-spacing:.06em;color:var(--gray-400);margin:var(--space-3) 0 6px}
    .rt-filtros-titulo svg{width:14px;height:14px}

    /* Oportunidades — tarjetas de resumen clickeables, tabla desktop / tarjetas mobile */
    .rt-kpi-click{transition:box-shadow .15s,border-color .15s}
    .rt-kpi-click:hover{box-shadow:var(--shadow-md,0 4px 16px rgba(0,0,0,.10))}
    .rt-kpi-activo{border:2px solid var(--croma-red,var(--accent));box-shadow:0 0 0 2px rgba(232,37,26,.12)}
    .rt-oportunidades-cards{display:none}
    .rt-opp-card{margin-bottom:10px;display:flex;flex-direction:column;gap:6px}
    .rt-opp-card-titulo{font-weight:700;font-size:14px}
    .rt-opp-card-linea{font-size:13px;color:var(--gray-600)}
    .rt-opp-card-motivo{font-size:12.5px;color:var(--gray-500);line-height:1.4}
    .rt-badges-secundarios{display:inline-flex;gap:4px;flex-wrap:wrap;margin-left:6px}
    .rt-badge-discreto{opacity:.65;font-size:10.5px;padding:2px 7px}
    @media (max-width:640px){
      .rt-oportunidades-tabla{display:none}
      .rt-oportunidades-cards{display:block}
    }
    .kl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--gray-400);margin-bottom:8px;line-height:1.3}
    .kv{font-family:var(--font-d);font-size:28px;letter-spacing:-.01em;line-height:1}

    /* Tabs */
    .tabs{display:flex;gap:3px;background:var(--white);border:1px solid var(--gray-100);
      border-radius:12px;padding:4px;margin:14px 0;overflow-x:auto;scrollbar-width:none;max-width:100%}
    .tabs::-webkit-scrollbar{display:none}
    .tab{font:inherit;font-size:13px;font-weight:600;color:var(--gray-400);background:none;
      border:none;border-radius:8px;padding:7px 14px;cursor:pointer;white-space:nowrap;transition:.13s}
    .tab:hover{color:var(--black)}
    .tab.active{background:var(--black);color:#fff}

    .btn-sm{font:inherit;font-size:12px;font-weight:600;color:var(--black);background:var(--gray-50);
      border:1px solid var(--gray-200);border-radius:8px;padding:5px 12px;cursor:pointer;
      display:inline-flex;align-items:center;gap:5px;transition:.15s}
    .btn-sm:hover{border-color:var(--black)}
    .btn-sm svg{width:13px;height:13px;stroke:currentColor;stroke-linecap:round;stroke-linejoin:round;flex:none}

    /* Table */
    .scroll{overflow-x:auto}
    table{width:100%;border-collapse:collapse;font-size:13px}
    thead th{text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;
      letter-spacing:.06em;color:var(--gray-400);padding:10px 14px;background:var(--gray-50);
      position:sticky;top:0;white-space:nowrap;cursor:pointer;user-select:none;border-bottom:1px solid var(--gray-100)}
    thead th.ns{cursor:default}
    thead th .arr{opacity:.3;font-size:9px;margin-left:3px}
    thead th.sorted .arr{opacity:1;color:var(--black)}
    tbody td{padding:9px 14px;border-top:1px solid var(--gray-100);vertical-align:middle}
    tbody tr:hover{background:#fafaf8}
    .nr{text-align:right;font-weight:600;white-space:nowrap}
    .pname{font-weight:500;max-width:230px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

    /* Sucursal badges */
    .sb{font-size:11px;font-weight:700;padding:2px 9px;border-radius:99px;white-space:nowrap;display:inline-block}
    .s01{color:var(--suc-01);background:var(--suc-01-s)}
    .s05{color:var(--suc-05);background:var(--suc-05-s)}
    .s09{color:var(--suc-09);background:var(--suc-09-s)}
    .s10{color:var(--suc-10);background:var(--suc-10-s)}
    .s12{color:var(--suc-12);background:var(--suc-12-s)}
    .s14{color:var(--suc-14);background:var(--suc-14-s)}

    /* Dashboard mini rows */
    .dash-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:14px}

    /* Tiempo real — badges de ubicación: sucursal comercial, centro 0000 (DEPO) y
       depósito 90/93 son tres cosas distintas, nunca se mezclan visualmente */
    .sb.s00{color:var(--gray-600);background:var(--gray-100)}
    .sb.dep90{color:var(--amber);background:var(--amber-s)}
    .sb.dep93{color:var(--risk);background:var(--risk-s)}

    .rt-state{padding:40px 20px;text-align:center;color:var(--gray-400);font-size:13px}
    .rt-state .spinner{border:2px solid var(--gray-200);border-top-color:var(--black);margin:0 auto 12px}
    .rt-state .btn-sm{margin-top:12px}
    .rt-state-icon{width:36px;height:36px;border-radius:50%;display:grid;place-items:center;
      margin:0 auto 10px;background:var(--gray-100);color:var(--gray-400)}
    .rt-state-icon svg{width:18px;height:18px}
    .rt-state-icon.danger{background:var(--danger-bg);color:var(--danger)}
    .rt-note{font-size:11.5px;color:var(--gray-400);padding:10px 16px;border-top:1px solid var(--gray-100);line-height:1.6}

    /* Estado "pendiente" (dato del boceto que la API todavia no entrega, ver Fase 1) */
    .rt-pendiente{border-style:dashed;border-color:var(--gray-200)}
    .rt-pendiente-head{display:flex;align-items:center;gap:8px;margin-bottom:4px}
    .rt-pendiente-head .rt-state-icon{margin:0;width:28px;height:28px}
    .rt-pendiente-head .rt-state-icon svg{width:14px;height:14px}
    .rt-pendiente .rt-note{padding:0;border-top:none}

    /* Insights del periodo */
    .rt-insights-lista{display:flex;flex-direction:column;gap:var(--space-3)}
    .rt-insight-fila{display:flex;align-items:flex-start;gap:10px;font-size:13px;line-height:1.5}
    .rt-insight-icon{width:30px;height:30px;border-radius:50%;display:grid;place-items:center;flex:none;
      background:var(--gray-100);color:var(--gray-600)}
    .rt-insight-icon svg{width:15px;height:15px}
    .rt-insight-icon.up{background:var(--success-bg);color:var(--success)}
    .rt-insight-icon.down{background:var(--danger-bg);color:var(--danger)}

    /* Vista Marcas -- KPIs en 2 columnas solo en tablet (601-900px), aislado del
       .rt-kpis compartido (Dashboard/Oportunidades no se tocan). */
    @media (min-width:601px) and (max-width:900px){
      .rt-marcas-kpis{grid-template-columns:repeat(2,1fr)}
    }

    /* Vista Marcas -- encabezado */
    .rt-marcas-header{margin-bottom:var(--space-4)}
    .rt-marcas-header p{font-size:13px;color:var(--gray-400);margin-top:2px}
    .rt-marcas-header .rt-note{padding:0;border-top:none;margin-top:4px}

    .rt-panel-head{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-bottom:12px}
    .rt-panel-head .rt-subtitulo{margin:0}

    /* Grafico de barras "Ventas por marca" */
    .rt-chart-toggle{display:flex;gap:4px}
    .rt-barras-lista{display:flex;flex-direction:column;gap:8px;max-height:420px;overflow-y:auto;padding-right:2px}
    .rt-barra-fila{display:flex;align-items:center;gap:10px;width:100%;font:inherit;background:none;
      border:none;border-radius:8px;padding:4px 6px;cursor:pointer;text-align:left;transition:background-color .13s}
    .rt-barra-fila:hover{background:var(--gray-50)}
    .rt-barra-fila.rt-marcas-activa{background:var(--accent-s)}
    .rt-barra-nombre{width:120px;flex:none;font-size:12.5px;font-weight:600;color:var(--black);
      overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .rt-barra-track{flex:1;height:14px;border-radius:99px;background:var(--gray-100);overflow:hidden}
    .rt-barra-fill{display:block;height:100%;border-radius:99px;background:var(--accent);transition:width .2s}
    .rt-barra-valor{width:64px;flex:none;text-align:right;font-size:12.5px;font-weight:700;font-variant-numeric:tabular-nums}

    /* Grafico de dona "Participacion de ventas" */
    .rt-dona-wrap{display:flex;flex-direction:column;align-items:center;gap:var(--space-4)}
    .rt-dona-circulo{width:180px;height:180px;border-radius:50%;position:relative;flex:none}
    .rt-dona-circulo::after{content:'';position:absolute;inset:26px;border-radius:50%;background:var(--white)}
    .rt-dona-centro{position:absolute;inset:26px;border-radius:50%;display:flex;flex-direction:column;
      align-items:center;justify-content:center;text-align:center;z-index:1}
    .rt-dona-centro b{font-family:var(--font-display);font-size:20px;letter-spacing:-.01em}
    .rt-dona-centro span{font-size:10.5px;color:var(--gray-400);text-transform:uppercase;letter-spacing:.05em}
    .rt-dona-leyenda{display:flex;flex-direction:column;gap:6px;width:100%}
    .rt-dona-item{display:flex;align-items:center;gap:8px;width:100%;font:inherit;background:none;
      border:none;border-radius:8px;padding:5px 6px;cursor:pointer;text-align:left;font-size:12.5px;transition:background-color .13s}
    .rt-dona-item:hover{background:var(--gray-50)}
    .rt-dona-item.rt-marcas-activa{background:var(--accent-s)}
    .rt-dona-chip{width:10px;height:10px;border-radius:3px;flex:none}
    .rt-dona-item-nombre{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:600}
    .rt-dona-item-valor{flex:none;color:var(--gray-400);font-variant-numeric:tabular-nums}

    /* Detalle de marca seleccionada */
    .rt-marcas-detalle{border-color:var(--accent);margin-bottom:var(--space-4)}
    .rt-marcas-detalle-head{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-bottom:10px}
    .rt-marcas-detalle-titulo{font-family:var(--font-display);font-size:17px;letter-spacing:.5px}
    .rt-marcas-detalle-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:10px}
    .rt-marcas-detalle-item .kl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--gray-400)}
    .rt-marcas-detalle-item .kv{font-family:var(--font-display);font-size:19px;margin-top:2px}

    /* Toolbar (buscador + filas por pagina) y tabla ordenable */
    .rt-marcas-toolbar{display:flex;align-items:flex-end;gap:12px;flex-wrap:wrap;margin-bottom:12px}
    .rt-marcas-search{position:relative;flex:1;min-width:200px;max-width:340px}
    .rt-marcas-search svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--gray-400);width:15px;height:15px}
    .rt-marcas-search input{width:100%;padding:7px 32px 7px 32px!important}
    .rt-marcas-search-clear{position:absolute;right:5px;top:50%;transform:translateY(-50%);background:none;
      border:none;cursor:pointer;color:var(--gray-400);display:flex;padding:4px;border-radius:6px}
    .rt-marcas-search-clear:hover{color:var(--black);background:var(--gray-100)}
    .rt-marcas-filas-sel{display:flex;flex-direction:column;gap:3px}
    .rt-marcas-filas-sel label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--gray-400)}
    table.rt-table th.rt-th-ordenable{padding:0}
    .rt-th-btn{background:none;border:none;font:inherit;font-size:10.5px;font-weight:700;text-transform:uppercase;
      letter-spacing:.05em;color:var(--gray-400);cursor:pointer;display:flex;align-items:center;
      padding:9px 12px;width:100%;white-space:nowrap}
    .rt-th-btn:hover{color:var(--black)}
    .rt-th-arrow{opacity:.35;font-size:9px;margin-left:3px}

<script>
'use strict';

const HUB_URL = 'https://croma-app.com.ar/';
// croma-api — stock real desde Sysneo (solo lectura). Requiere que el origen de esta app
// esté sumado a ORIGENES_PERMITIDOS en croma-api/index.js (ya aplicado).
const STOCK_API_URL = 'https://stock-api.croma-app.com.ar';

const SIZE_ALPHA = ['XS','S','M','L','XL','XXL','2XL','3XL','UNICA','U','UNI'];
function sizeSort(a, b) {
  const na = Number(a), nb = Number(b);
  if (!isNaN(na) && !isNaN(nb)) return na - nb;
  const ia = SIZE_ALPHA.indexOf(String(a).toUpperCase());
  const ib = SIZE_ALPHA.indexOf(String(b).toUpperCase());
  if (ia >= 0 && ib >= 0) return ia - ib;
  if (ia >= 0) return -1; if (ib >= 0) return 1;
  return String(a).localeCompare(String(b), 'es');
}

const nf  = new Intl.NumberFormat('es-AR');
const nf1 = new Intl.NumberFormat('es-AR', { maximumFractionDigits:1 });
const money  = v => '$' + nf.format(Math.round(v));
const pct    = v => (v * 100).toFixed(1).replace('.', ',') + '%';
const norm   = s => String(s ?? '').replace(/\s+/g,' ').trim().toUpperCase();
const esc    = s => String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

// El estado del modo Tiempo real (RT_*) se declara junto con sus funciones,
// mas abajo en este mismo archivo (bloque "Tiempo real (croma-api)").

// ── Auth ──────────────────────────────────────────────────────────────────────
function getToken() { return sessionStorage.getItem('croma_token') || localStorage.getItem('croma_token'); }
function getUser() {
  const t = getToken(); if (!t) return null;
  try {
    const p = JSON.parse(atob(t.split('.')[1].replace(/-/g,'+').replace(/_/g,'/')));
    return p.exp * 1000 < Date.now() ? null : p;
  } catch(e) { return null; }
}

(function init() {
  const hash = location.hash.slice(1);
  if (hash) {
    const token = new URLSearchParams(hash).get('token');
    if (token) { sessionStorage.setItem('croma_token', token); history.replaceState(null,'',location.pathname); }
  }
  const user = getUser();
  if (!user || user.rol !== 'admin') {
    document.getElementById('authSpinner').style.display = 'none';
    document.getElementById('authMsg').textContent = 'Sin acceso o sesión expirada.';
    document.getElementById('authFallback').style.display = 'block';
    return;
  }
  document.getElementById('authCheck').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  const u = user.usuario || '';
  document.getElementById('hUser').innerHTML = icon('user','icon-16') + ' ' + esc(u ? u.charAt(0).toUpperCase() + u.slice(1) : 'Usuario');
  setup();
  // Diferido: RT_DESDE/RT_HASTA (let, más abajo en el mismo script) todavía no
  // están inicializadas cuando este IIFE corre de forma síncrona al parsear.
  setTimeout(iniciarModoRT, 0);
})();

// ── Setup ─────────────────────────────────────────────────────────────────────
function setup() {
  document.getElementById('btnSalir').addEventListener('click', () => { location.href = HUB_URL + '?logout=1'; });

  document.getElementById('rtBtnActualizar').addEventListener('click', () => {
    RT_COMPLETO = null; RT_INSIGHT_OPP_ALTA_KEY = null;
    rtCargarResumen(); rtCargarResumenAnterior(); if (RT_FILTRO) rtCargarCompleto();
  });
  document.getElementById('rtTabs').addEventListener('click', e => {
    const btn = e.target.closest('.tab'); if (!btn) return;
    rtCambiarVista(btn.dataset.view);
  });
  document.getElementById('rtDesde').addEventListener('change', rtCambiarPeriodo);
  document.getElementById('rtHasta').addEventListener('change', rtCambiarPeriodo);
}

// ── Tiempo real (croma-api) ─────────────────────────────────────────────────
// Construcción de DOM sin innerHTML sobre datos de la API. opts.html queda
// reservado solo para fragmentos estáticos (nunca usado con datos de croma-api).
// Fuentes: /analisis/resumen (dashboard, marcas, rubros, subrubros, sucursales —
// agregados en el servidor, nunca se baja el detalle completo) y /analisis/stock-ventas
// (productos, talles y colores, oportunidades — exige filtro, pagina de a 100/500).
const RT_CENTROS = ['0001','0005','0009','0010','0012','0014'];
const RT_CENTRO_NOMBRE = {
  '0001':'01 Paseo', '0005':'05 Wave', '0009':'09 Cipo San Martín',
  '0010':'10 Perito Moreno', '0012':'12 Centenario', '0014':'14 Roca',
};
const RT_CENTRO_CLS = { '0001':'s01', '0005':'s05', '0009':'s09', '0010':'s10', '0012':'s12', '0014':'s14' };
const RT_LIMITE_PAGINAS_COMPLETO = 20; // tope de seguridad: 20 * 500 = 10.000 filas

let RT_DESDE = null, RT_HASTA = null;
let RT_VIEW = 'dashboard';
let RT_RESUMEN = null, RT_RESUMEN_LOADING = false, RT_RESUMEN_ERROR = null, RT_RESUMEN_ABORT = null;
// Resumen del "mismo periodo, año anterior" (mismas fechas de RT_DESDE/RT_HASTA, un año
// antes) -- solo alimenta los deltas de comparacion del dashboard. Se pide en paralelo a
// rtCargarResumen() pero nunca bloquea el render principal: si falla o tarda, el dashboard
// se muestra igual y el delta queda oculto/"sin comparacion". Cache en memoria por
// "desde|hasta" (dura la sesion).
const RT_RESUMEN_ANTERIOR_CACHE = new Map();
let RT_RESUMEN_ANTERIOR = null, RT_RESUMEN_ANTERIOR_LOADING = false, RT_RESUMEN_ANTERIOR_ERROR = null, RT_RESUMEN_ANTERIOR_ABORT = null;
// Insight "oportunidades prioritarias" del dashboard -- fetch propio y liviano
// (prioridad=alta, limit=1, solo interesa paginacion.total), independiente del estado
// de la pestaña Oportunidades para no pisar sus filtros/paginacion.
const RT_INSIGHT_OPP_ALTA_CACHE = new Map();
let RT_INSIGHT_OPP_ALTA = null, RT_INSIGHT_OPP_ALTA_LOADING = false, RT_INSIGHT_OPP_ALTA_ERROR = null;
let RT_INSIGHT_OPP_ALTA_ABORT = null, RT_INSIGHT_OPP_ALTA_KEY = null;

// ── Vista Marcas -- todo client-side sobre RT_RESUMEN.por_marca ya cargado, nunca pide
// una consulta nueva (ni al cambiar orden/buscar/paginar/seleccionar). Estado propio,
// namespaced RT_MARCAS_*, para no pisar el estado de otras vistas RT.
let RT_MARCAS_ORDEN = { campo:'ventas', dir:-1 }; // orden inicial: ventas desc
let RT_MARCAS_BUSQUEDA = '';
let RT_MARCAS_PAGINA = 0;
let RT_MARCAS_FILAS_POR_PAGINA = 10;
let RT_MARCAS_SELECCIONADA = null; // nombre de marca resaltada (grafico de barras/dona/tabla)
let RT_MARCAS_TOP_GRAFICO = 10; // 10 | 20 | 'todas' -- cuantas barras mostrar
// Umbral minimo de ventas para considerar una marca en el insight "mejor rotacion":
// sin esto, una marca con 1 venta y 0 stock da rotacion=100% y encabeza el ranking de
// forma enganosa. Constante con nombre para que quede documentado junto al calculo.
const RT_MARCAS_ROTACION_VENTAS_MIN = 10;
// Paleta categorica fija (6 colores + "Otras" en gris) reutilizando tokens ya definidos
// en este archivo/croma-ds.css -- nunca colores aleatorios ni hex nuevos.
const RT_MARCAS_PALETA = ['var(--accent)', 'var(--info)', 'var(--violet)', 'var(--teal)', 'var(--success)', 'var(--amber)'];
const RT_MARCAS_COLOR_OTRAS = 'var(--gray-300)';
let RT_FILTRO = null; // { marca } | { rubro } | { rubro, subrubro } | { codigo } | null
// Origen de RT_FILTRO cuando llega precargado desde otra vista (ej. 'Marcas') -- solo
// para mostrar el aviso en el encabezado de Productos, no cambia la consulta.
let RT_PRODUCTOS_FILTRO_ORIGEN = null;
let RT_COMPLETO = null; // { filtroKey, filas, capado, total } -- Productos y Talles y colores
let RT_COMPLETO_LOADING = false, RT_COMPLETO_ERROR = null, RT_COMPLETO_ERROR_KEY = null, RT_COMPLETO_PROGRESO = 0;
let RT_COMPLETO_ABORT = null, RT_COMPLETO_SEQ = 0;

// Vista Productos -- agrupa RT_COMPLETO.filas por Codigo_producto y pagina/ordena/busca
// client-side (mismo patron que Marcas), namespaced RT_PRODUCTOS_* para no pisar el
// estado de Marcas ni el de otras vistas RT.
let RT_PRODUCTOS_ORDEN = { campo:'ventas', dir:-1 };
let RT_PRODUCTOS_BUSQUEDA = '';
let RT_PRODUCTOS_PAGINA = 0;
let RT_PRODUCTOS_FILAS_POR_PAGINA = 10;

// RT_COMPLETO/rtCargarCompleto (eso ahora es de Productos y Talles y colores).
let RT_OPORTUNIDADES = null; // respuesta completa de /analisis/oportunidades
let RT_OPORTUNIDADES_LOADING = false, RT_OPORTUNIDADES_ERROR = null;
let RT_OPORTUNIDADES_ABORT = null, RT_OPORTUNIDADES_SEQ = 0;
let RT_OPORTUNIDADES_ESTADO = null; // filtro de pestaña por estado_principal O secundario
let RT_OPORTUNIDADES_PRIORIDAD = null;
let RT_OPORTUNIDADES_CONFIANZA = null; // 'alta' | 'manual' | null (todos) -- solo afecta posible_rotacion
let RT_OPORTUNIDADES_ROTACION = { origen:'', destino:'', ventasDestinoMin:'', stockOrigenMin:'', coberturaOrigenMin:'' };
let RT_OPORTUNIDADES_OFFSET = 0;
const RT_OPORTUNIDADES_LIMITE = 50;
const RT_ESTADO_CLS = {
  reposicion_urgente: 'badge-danger', revisar_deposito: 'badge-danger', posible_rotacion: 'badge-danger',
  reposicion_proxima: 'badge-warning', venta_destacada: 'badge-warning', bien_vendido: 'badge-warning',
  seguimiento: 'badge-neutral', posible_descuento: 'badge-neutral', stock_parado: 'badge-neutral',
};

// Boton chico con icono del helper icon() + texto -- unico lugar donde se arma este
// patron (botones "Buscar"/"Filtrar" de Productos y Oportunidades), para no repetir
// el mismo innerHTML a mano en cada vista.
function rtBotonIcono(className, iconName, texto) {
  const btn = rtEl('button', { className });
  btn.type = 'button';
  const span = rtEl('span', { className:'rt-boton-icono-svg' });
  span.innerHTML = icon(iconName, 'icon-16'); // icono estatico, no dato de API
  btn.appendChild(span);
  btn.appendChild(document.createTextNode(texto));
  return btn;
}

function rtEl(tag, opts) {
  const e = document.createElement(tag);
  if (opts) {
    if (opts.className != null) e.className = opts.className;
    if (opts.text != null) e.textContent = opts.text;
    if (opts.html != null) e.innerHTML = opts.html;
    if (opts.attrs) Object.keys(opts.attrs).forEach(k => e.setAttribute(k, opts.attrs[k]));
  }
  return e;
}

function rtEstado(container, tipo, mensaje, onRetry) {
  if (!container) return;
  container.replaceChildren();
  if (tipo === 'ninguno') return;
  const box = rtEl('div', { className:'rt-state' });
  if (tipo === 'loading') {
    box.appendChild(rtEl('div', { className:'spinner' }));
    box.appendChild(rtEl('p', { text: mensaje || 'Cargando...' }));
  } else if (tipo === 'error') {
    const iconoErr = rtEl('div', { className:'rt-state-icon danger' });
    iconoErr.innerHTML = icon('alertTriangle', ''); // icono estatico del helper
    box.appendChild(iconoErr);
    box.appendChild(rtEl('p', { text: mensaje || 'Error de conexión.' }));
    if (onRetry) {
      const btn = rtBotonIcono('btn-sm', 'refresh', 'Reintentar');
      btn.addEventListener('click', onRetry);
      box.appendChild(btn);
    }
  } else if (tipo === 'vacio') {
    const iconoVacio = rtEl('div', { className:'rt-state-icon' });
    iconoVacio.innerHTML = icon('info', ''); // icono estatico del helper
    box.appendChild(iconoVacio);
    box.appendChild(rtEl('p', { text: mensaje || 'Sin datos.' }));
  }
  container.appendChild(box);
}

// Estado "pendiente de implementacion" (distinto de loading/error/vacio): se usa para
// secciones del boceto cuyo dato todavia no entrega la API (ver diagnostico Fase 1) --
// nunca se rellena con datos simulados, siempre queda visualmente explicito.
function rtPanelPendiente(detalle) {
  const box = rtEl('div', { className:'card rt-pendiente' });
  const head = rtEl('div', { className:'rt-pendiente-head' });
  const iconoPendiente = rtEl('span', { className:'rt-state-icon' });
  iconoPendiente.innerHTML = icon('info', ''); // icono estatico del helper
  head.appendChild(iconoPendiente);
  head.appendChild(rtEl('span', { className:'badge badge-neutral', text:'Pendiente' }));
  box.appendChild(head);
  box.appendChild(rtEl('p', { className:'rt-note', text: detalle }));
  return box;
}

function rtFmtFecha(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  if (isNaN(d)) return '—';
  return String(d.getDate()).padStart(2,'0') + '/' + String(d.getMonth()+1).padStart(2,'0') + '/' + d.getFullYear();
}

function rtPeriodoDefecto() {
  const hoy = new Date();
  const hace90 = new Date(hoy.getTime() - 90 * 864e5);
  const fmt = d => d.toISOString().slice(0, 10);
  return { desde: fmt(hace90), hasta: fmt(hoy) };
}

// ── Arranque y período (recordado durante la sesión) ────────────────────────
function iniciarModoRT() {
  const guardado = sessionStorage.getItem('rt_periodo');
  let periodo = null;
  if (guardado) { try { periodo = JSON.parse(guardado); } catch (e) {} }
  if (!periodo || !periodo.desde || !periodo.hasta) periodo = rtPeriodoDefecto();
  RT_DESDE = periodo.desde; RT_HASTA = periodo.hasta;
  document.getElementById('rtDesde').value = RT_DESDE;
  document.getElementById('rtHasta').value = RT_HASTA;
  rtCargarResumen();
  rtCargarResumenAnterior(); // en paralelo, nunca bloquea el dashboard principal
}

function rtGuardarPeriodo() {
  sessionStorage.setItem('rt_periodo', JSON.stringify({ desde: RT_DESDE, hasta: RT_HASTA }));
}

function rtCambiarPeriodo() {
  const desde = document.getElementById('rtDesde').value;
  const hasta = document.getElementById('rtHasta').value;
  if (!desde || !hasta) return;
  if (desde === RT_DESDE && hasta === RT_HASTA) return;
  RT_DESDE = desde; RT_HASTA = hasta;
  rtGuardarPeriodo();
  RT_COMPLETO = null; RT_OPORTUNIDADES = null; RT_OPORTUNIDADES_OFFSET = 0;
  if (RT_COMPLETO_ABORT) { RT_COMPLETO_ABORT.abort(); RT_COMPLETO_ABORT = null; }
  if (RT_OPORTUNIDADES_ABORT) { RT_OPORTUNIDADES_ABORT.abort(); RT_OPORTUNIDADES_ABORT = null; }
  // orden/busqueda/filas-por-pagina son preferencia del usuario y persisten; pagina y
  // seleccion se resetean porque la lista de marcas/productos del nuevo periodo puede ser otra.
  RT_MARCAS_PAGINA = 0; RT_MARCAS_SELECCIONADA = null;
  RT_PRODUCTOS_PAGINA = 0; RT_PRODUCTOS_EXPANDIDO = null;
  // RT_COMPLETO ya quedo en null arriba -- la vista activa (Productos o Talles y colores)
  // lo vuelve a pedir sola en su proximo render (mismo patron lazy que ya existia).
  rtCargarResumen();
  rtCargarResumenAnterior(); // en paralelo, nunca bloquea el dashboard principal
}

async function rtCargarResumen() {
  if (RT_RESUMEN_ABORT) RT_RESUMEN_ABORT.abort();
  const controller = new AbortController();
  RT_RESUMEN_ABORT = controller;
  RT_RESUMEN_LOADING = true; RT_RESUMEN_ERROR = null; RT_RESUMEN = null;
  rtRenderVistaActual();
  try {
    const url = STOCK_API_URL + '/analisis/resumen?desde=' + encodeURIComponent(RT_DESDE) + '&hasta=' + encodeURIComponent(RT_HASTA);
    const resp = await fetch(url, { signal: controller.signal });
    const data = await resp.json();
    if (!resp.ok || !data.ok) throw new Error(data.error || ('HTTP ' + resp.status));
    RT_RESUMEN = data;
    document.getElementById('rtUltimaActualizacion').textContent =
      'Actualizado ' + new Date().toLocaleTimeString('es-AR', { hour:'2-digit', minute:'2-digit' });
  } catch (err) {
    if (err.name === 'AbortError') return;
    RT_RESUMEN_ERROR = err.message;
  } finally {
    RT_RESUMEN_LOADING = false;
    rtRenderVistaActual();
  }
}

// Rango "mismo periodo, año anterior": mismas fechas (mes y dia) de desde/hasta, un
// año antes -- no son los N dias inmediatamente previos. Si "hasta" cae en 29/02 y el
// año anterior no es bisiesto, el Date nativo lo normaliza a 01/03 (no se corrige a mano).
function rtRangoAnterior(desde, hasta) {
  const dDesde = new Date(desde + 'T00:00:00Z');
  const dHasta = new Date(hasta + 'T00:00:00Z');
  const anteriorDesde = new Date(Date.UTC(dDesde.getUTCFullYear() - 1, dDesde.getUTCMonth(), dDesde.getUTCDate()));
  const anteriorHasta = new Date(Date.UTC(dHasta.getUTCFullYear() - 1, dHasta.getUTCMonth(), dHasta.getUTCDate()));
  const fmt = d => d.toISOString().slice(0, 10);
  return { desde: fmt(anteriorDesde), hasta: fmt(anteriorHasta) };
}

// Se llama siempre en paralelo a rtCargarResumen() (nunca con await entre medio), y
// nunca lanza ni bloquea el render del dashboard principal: un fallo solo hace que el
// delta de comparacion quede oculto. Cacheada por "desde|hasta" para no repetir el
// fetch si el usuario vuelve al mismo periodo dentro de la sesion.
async function rtCargarResumenAnterior() {
  if (RT_RESUMEN_ANTERIOR_ABORT) RT_RESUMEN_ANTERIOR_ABORT.abort();
  const { desde, hasta } = rtRangoAnterior(RT_DESDE, RT_HASTA);
  const cacheKey = desde + '|' + hasta;
  const cacheado = RT_RESUMEN_ANTERIOR_CACHE.get(cacheKey);
  if (cacheado) {
    RT_RESUMEN_ANTERIOR = cacheado; RT_RESUMEN_ANTERIOR_LOADING = false; RT_RESUMEN_ANTERIOR_ERROR = null;
    rtRenderVistaActual();
    return;
  }
  const controller = new AbortController();
  RT_RESUMEN_ANTERIOR_ABORT = controller;
  RT_RESUMEN_ANTERIOR_LOADING = true; RT_RESUMEN_ANTERIOR_ERROR = null; RT_RESUMEN_ANTERIOR = null;
  rtRenderVistaActual();
  try {
    const url = STOCK_API_URL + '/analisis/resumen?desde=' + encodeURIComponent(desde) + '&hasta=' + encodeURIComponent(hasta);
    const resp = await fetch(url, { signal: controller.signal });
    const data = await resp.json();
    if (!resp.ok || !data.ok) throw new Error(data.error || ('HTTP ' + resp.status));
    RT_RESUMEN_ANTERIOR_CACHE.set(cacheKey, data);
    RT_RESUMEN_ANTERIOR = data;
  } catch (err) {
    if (err.name === 'AbortError') return;
    RT_RESUMEN_ANTERIOR = null; RT_RESUMEN_ANTERIOR_ERROR = err.message; // no bloquea el dashboard principal
  } finally {
    RT_RESUMEN_ANTERIOR_LOADING = false;
    rtRenderVistaActual();
  }
}

// null cuando no se puede comparar de forma valida (sin dato anterior, o anterior = 0 --
// evita division por cero / porcentajes infinitos).
function rtDelta(actual, anterior) {
  if (actual == null || !isFinite(actual)) return null;
  if (anterior == null || !isFinite(anterior) || anterior === 0) return null;
  const cambio = (actual - anterior) / anterior;
  const direction = cambio > 0.0005 ? 'up' : (cambio < -0.0005 ? 'down' : 'flat');
  return { pct: cambio, direction };
}

function rtDeltaBadge(delta) {
  if (RT_RESUMEN_ANTERIOR_LOADING) return rtEl('span', { className:'rt-kpi-delta flat', text:'Comparando con el mismo período del año anterior…' });
  if (!delta) return rtEl('span', { className:'rt-kpi-delta flat', text:'Sin comparación disponible' });
  if (delta.direction === 'flat') return null; // sin cambio real -- no vale la pena mostrar "0,0%"
  const span = rtEl('span', { className:'rt-kpi-delta ' + delta.direction });
  const flechaCls = delta.direction === 'up' ? 'arrow-up' : '';
  span.innerHTML = icon('arrowDown', flechaCls); // icono estatico del helper
  span.appendChild(document.createTextNode(' ' + pct(Math.abs(delta.pct)) + ' vs. mismo período año anterior'));
  return span;
}

function rtFiltroKey() {

}

function rtFiltroTexto() {
  if (!RT_FILTRO) return '';
  if (RT_FILTRO.codigo) return 'Código: ' + RT_FILTRO.codigo;
  if (RT_FILTRO.rubro && RT_FILTRO.subrubro) return 'Rubro: ' + RT_FILTRO.rubro + ' · Subrubro: ' + RT_FILTRO.subrubro;
  if (RT_FILTRO.rubro) return 'Rubro: ' + RT_FILTRO.rubro;

}

function rtRenderVistaActual() {
  const host = document.getElementById('rtPanelHost');
  if (!host) return;
  host.replaceChildren();
  if (RT_VIEW === 'dashboard') renderRTDashboard(host);
  else if (RT_VIEW === 'marcas') renderRTMarcas(host);
  else if (RT_VIEW === 'rubros') renderRTGrupo(host, 'rubro', 'por_rubro', 'Rubro');
  else if (RT_VIEW === 'subrubros') renderRTSubrubros(host);
  else if (RT_VIEW === 'sucursales') renderRTSucursales(host);
  else if (RT_VIEW === 'productos') renderRTProductos(host);
  else if (RT_VIEW === 'talles-colores') renderRTTallesColores(host);
  else if (RT_VIEW === 'oportunidades') renderRTOportunidades(host);
}

// ── Tabla genérica ───────────────────────────────────────────────────────────
function rtTabla(headers, filas, renderFila, opts) {
  const wrap = rtEl('div', { className:'rt-table-wrap' });

  const trh = rtEl('tr');
  headers.forEach(h => trh.appendChild(rtEl('th', { text:h })));

// ── Dashboard ─────────────────────────────────────────────────────────────────
// Tarjeta de KPI con icono del helper icon() + valor + (opcional) delta vs periodo
// anterior. Unico lugar donde se arma este componente -- reutilizado por todas las
// tarjetas del dashboard para no repetir el mismo markup en cada una.
function rtTarjetaKPI(def) {
  const card = rtEl('div', { className:'card rt-kpi' });
  const iconChip = rtEl('div', { className:'rt-kpi-icon' });
  iconChip.innerHTML = icon(def.icon, ''); // icono estatico del helper, no dato de API
  card.appendChild(iconChip);
  card.appendChild(rtEl('div', { className:'rt-kpi-label', text: def.label }));
  card.appendChild(rtEl('div', { className:'rt-kpi-valor', text: nf.format(def.valor) }));
  if (def.deltaActual !== undefined) {
    const badge = rtDeltaBadge(rtDelta(def.deltaActual, def.deltaAnterior));
    if (badge) card.appendChild(badge);
  }
  return card;
}

function renderRTDashboard(host) {
  if (RT_RESUMEN_LOADING) return rtEstado(host, 'loading', 'Cargando resumen del período...');
  if (RT_RESUMEN_ERROR) return rtEstado(host, 'error', 'No se pudo cargar el resumen. ' + RT_RESUMEN_ERROR, rtCargarResumen);
  if (!RT_RESUMEN) return rtEstado(host, 'vacio', 'Sin datos.');
  const t = RT_RESUMEN.totales;
  const tAnterior = RT_RESUMEN_ANTERIOR ? RT_RESUMEN_ANTERIOR.totales : null;

  const kpis = rtEl('div', { className:'rt-kpis' });
  const kpiDefs = [
    { label:'Ventas del período', valor:t.Ventas_total, icon:'shoppingCart', deltaActual:t.Ventas_total, deltaAnterior: tAnterior && tAnterior.Ventas_total },
    { label:'Stock total', valor:t.Stock_total, icon:'package', deltaActual:t.Stock_total, deltaAnterior: tAnterior && tAnterior.Stock_total },
    { label:'Depósito Central (90)', valor:t.Stock_deposito_90, icon:'warehouse' },
    { label:'Fallados (93)', valor:t.Stock_deposito_93, icon:'warehouse' },
    { label:'Productos base', valor:t.productos_base, icon:'shirt' },
    { label:'Variantes con actividad', valor:t.variantes, icon:'barChart3' },
    { label:'Variantes con stock', valor:t.variantes_con_stock, icon:'circleCheck' },
    { label:'Variantes sin ventas', valor:t.variantes_sin_ventas, icon:'info' },
  ];
  kpiDefs.forEach(def => kpis.appendChild(rtTarjetaKPI(def)));
  host.appendChild(kpis);

  const grid = rtEl('div', { className:'dash-grid' });

  const panelSucursales = rtEl('div');
  panelSucursales.appendChild(rtEl('h3', { text:'Ventas y stock por sucursal', className:'rt-subtitulo' }));
  panelSucursales.appendChild(rtTabla(
    ['Sucursal', 'Ventas', 'Stock'],
    RT_CENTROS,
    (centro) => {
      const s = RT_RESUMEN.por_sucursal[centro] || { ventas:0, stock:0 };
      const tr = rtEl('tr');
      tr.appendChild(rtEl('td', { text: RT_CENTRO_NOMBRE[centro] }));
      tr.appendChild(rtEl('td', { text: nf.format(s.ventas) }));
      tr.appendChild(rtEl('td', { text: nf.format(s.stock) }));
      return tr;
    }
  ));
  grid.appendChild(panelSucursales);

  const panelTop = rtEl('div');
  panelTop.appendChild(rtEl('h3', { text:'Top productos por ventas', className:'rt-subtitulo' }));
  // Tolerante a una API todavia sin desplegar: top_productos puede no venir en la respuesta
  // (version anterior de /analisis/resumen) -- en ese caso queda el estado informativo, nunca
  // datos simulados. No hace falta una segunda consulta: el campo ya viene armado en /resumen.
  const topProductos = Array.isArray(RT_RESUMEN.top_productos) ? RT_RESUMEN.top_productos : null;
  if (topProductos === null) {
    panelTop.appendChild(rtPanelPendiente(
      'Top productos por ventas requiere una versión de la API que todavía no está desplegada ' +
      '(el campo top_productos no vino en la respuesta de /analisis/resumen).'
    ));
  } else if (!topProductos.length) {
    const vacioHost = rtEl('div', { className:'card' });
    rtEstado(vacioHost, 'vacio', 'Sin ventas en el período para calcular un top de productos.');
    panelTop.appendChild(vacioHost);
  } else {
    const ordenados = topProductos.slice().sort((a, b) => (b.ventas || 0) - (a.ventas || 0));
    panelTop.appendChild(rtTabla(
      ['Código', 'Producto', 'Marca', 'Ventas'],
      ordenados,
      (f) => {
        const tr = rtEl('tr');
        tr.appendChild(rtEl('td', { text: f.codigo || '—' }));
        tr.appendChild(rtEl('td', { text: f.producto || '—' }));
        tr.appendChild(rtEl('td', { text: f.marca || '—' }));
        tr.appendChild(rtEl('td', { text: nf.format(f.ventas || 0) }));
        return tr;
      }
    ));
  }
  grid.appendChild(panelTop);

  host.appendChild(grid);

  renderRTInsights(host, t, tAnterior);
}

// ── Insights del período (solo metricas derivables de datos ya confiables -- el margen
// bruto queda pospuesto hasta definir formula/ponderacion/tratamiento de costos) ──────
function rtCargarInsightOportunidadesAlta() {
  const key = RT_DESDE + '|' + RT_HASTA;
  // Una vez intentado para este periodo (exito, error o en curso) no se reintenta solo
  // porque el dashboard se vuelva a renderizar -- un error aca no debe convertirse en un
  // fetch en loop en cada render. Reintenta recien cuando cambia el periodo (nueva key)
  // o con una accion explicita del usuario (Actualizar).
  if (RT_INSIGHT_OPP_ALTA_KEY === key) return;
  const cacheado = RT_INSIGHT_OPP_ALTA_CACHE.get(key);
  if (cacheado != null) { RT_INSIGHT_OPP_ALTA = cacheado; RT_INSIGHT_OPP_ALTA_KEY = key; rtRenderVistaActual(); return; }
  if (RT_INSIGHT_OPP_ALTA_ABORT) RT_INSIGHT_OPP_ALTA_ABORT.abort();
  const controller = new AbortController();
  RT_INSIGHT_OPP_ALTA_ABORT = controller;
  RT_INSIGHT_OPP_ALTA_KEY = key; RT_INSIGHT_OPP_ALTA_LOADING = true; RT_INSIGHT_OPP_ALTA_ERROR = null;
  (async () => {
    try {
      const params = new URLSearchParams({ desde: RT_DESDE, hasta: RT_HASTA, prioridad: 'alta', limit: '1' });
      const resp = await fetch(STOCK_API_URL + '/analisis/oportunidades?' + params.toString(), { signal: controller.signal });
      const data = await resp.json();
      if (!resp.ok || !data.ok) throw new Error(data.error || ('HTTP ' + resp.status));
      RT_INSIGHT_OPP_ALTA = data.paginacion.total;
      RT_INSIGHT_OPP_ALTA_CACHE.set(key, RT_INSIGHT_OPP_ALTA);
    } catch (err) {
      if (err.name === 'AbortError') return;
      RT_INSIGHT_OPP_ALTA_ERROR = err.message;
    } finally {
      RT_INSIGHT_OPP_ALTA_LOADING = false;
      rtRenderVistaActual();
    }
  })();
}

function rtInsightFila(iconName, cls, html) {
  const fila = rtEl('div', { className:'rt-insight-fila' });
  const chip = rtEl('div', { className:'rt-insight-icon' + (cls ? ' ' + cls : '') });
  chip.innerHTML = icon(iconName, ''); // icono estatico del helper
  fila.appendChild(chip);
  const texto = rtEl('div');
  texto.innerHTML = html; // fragmento armado en las funciones de abajo, con esc() sobre cualquier dato de API
  fila.appendChild(texto);
  return fila;
}

function renderRTInsights(host, t, tAnterior) {
  const panel = rtEl('div', { className:'card' });
  panel.appendChild(rtEl('h3', { text:'Insights del período', className:'rt-subtitulo' }));
  const lista = rtEl('div', { className:'rt-insights-lista' });

  // 1) Variacion de ventas vs mismo periodo del año anterior
  const deltaVentas = rtDelta(t.Ventas_total, tAnterior && tAnterior.Ventas_total);
  if (RT_RESUMEN_ANTERIOR_LOADING) {
    lista.appendChild(rtInsightFila('barChart3', '', 'Comparando ventas con el mismo período del año anterior…'));
  } else if (!deltaVentas) {
    lista.appendChild(rtInsightFila('barChart3', '', 'Sin comparación disponible contra el mismo período del año anterior.'));
  } else {
    const subio = deltaVentas.direction === 'up';
    lista.appendChild(rtInsightFila('barChart3', subio ? 'up' : (deltaVentas.direction === 'down' ? 'down' : ''),
      'Las ventas ' + (subio ? 'aumentaron' : deltaVentas.direction === 'down' ? 'bajaron' : 'se mantuvieron') +
      ' <b>' + esc(pct(Math.abs(deltaVentas.pct))) + '</b> comparado con el mismo período del año anterior.'));
  }

  // 2) Sucursal con mejor rotacion (ventas / (ventas+stock), mismo patron que sell-through)
  let mejorSuc = null;
  RT_CENTROS.forEach(c => {
    const s = RT_RESUMEN.por_sucursal[c];
    if (!s) return;
    const disp = s.ventas + s.stock;
    if (disp <= 0) return;
    const rot = s.ventas / disp;
    if (!mejorSuc || rot > mejorSuc.rot) mejorSuc = { centro:c, rot };
  });
  if (mejorSuc) {
    lista.appendChild(rtInsightFila('store', '', '<b>' + esc(RT_CENTRO_NOMBRE[mejorSuc.centro]) + '</b> tiene la mejor rotación de stock (' + esc(nf1.format(mejorSuc.rot)) + ').'));
  } else {
    lista.appendChild(rtInsightFila('store', '', 'Sin datos suficientes para calcular rotación por sucursal.'));
  }

  // 3) Rubro con mayor participacion (por_rubro ya viene ordenado por ventas_total desc)
  const topRubro = (RT_RESUMEN.por_rubro || [])[0];
  if (topRubro && t.Ventas_total > 0) {
    const participacion = topRubro.ventas_total / t.Ventas_total;
    lista.appendChild(rtInsightFila('barChart3', '', '<b>' + esc(topRubro.rubro) + '</b> es el rubro con mayor participación (' + esc(pct(participacion)) + ' de las ventas).'));
  } else {
    lista.appendChild(rtInsightFila('barChart3', '', 'Sin datos suficientes para calcular participación por rubro.'));
  }

  // 4) Variantes sin actividad
  lista.appendChild(rtInsightFila('info', '', '<b>' + esc(nf.format(t.variantes_sin_ventas)) + '</b> variantes sin ventas en el período.'));

  // 5) Oportunidades prioritarias (fetch liviano y propio, no comparte estado con la pestaña Oportunidades)
  rtCargarInsightOportunidadesAlta();
  if (RT_INSIGHT_OPP_ALTA_LOADING) {
    lista.appendChild(rtInsightFila('alertTriangle', '', 'Calculando oportunidades prioritarias…'));
  } else if (RT_INSIGHT_OPP_ALTA_ERROR) {
    lista.appendChild(rtInsightFila('alertTriangle', 'down', 'No se pudieron calcular las oportunidades prioritarias.'));
  } else if (RT_INSIGHT_OPP_ALTA != null) {
    lista.appendChild(rtInsightFila('alertTriangle', RT_INSIGHT_OPP_ALTA > 0 ? 'down' : '',
      '<b>' + esc(nf.format(RT_INSIGHT_OPP_ALTA)) + '</b> oportunidades de prioridad alta requieren atención.'));
  }

  panel.appendChild(lista);
  host.appendChild(panel);
}

// ── Marcas (vista dedicada -- Rubros/Subrubros siguen en renderRTGrupo/renderRTSubrubros,
// sin tocar) ──────────────────────────────────────────────────────────────────────────
// Todo lo de abajo opera client-side sobre RT_RESUMEN.por_marca ya cargado (misma
// respuesta que ya trae el Dashboard) -- ninguna funcion de esta seccion hace fetch.

// Normaliza por_marca a la forma que usan grafico/tabla/insights, calculando
// participacion y rotacion una sola vez (evita repetir la cuenta en cada lugar).
// participacion = ventas de la marca / Ventas_total del periodo (RT_RESUMEN.totales,
// no la suma de por_marca -- ver limite de 100 marcas mas abajo). rotacion =
// ventas / (ventas + stock); null cuando ventas+stock=0 (no hay Infinity/NaN).
function rtMarcasDatos() {
  const totalVentas = RT_RESUMEN.totales.Ventas_total;
  return (RT_RESUMEN.por_marca || []).map(m => {
    const ventas = m.ventas_total || 0, stock = m.stock_total || 0;
    const disp = ventas + stock;
    // Sysneo puede traer nombre_marca vacio (producto sin marca asignada en el
    // catalogo) -- se muestra como "Sin marca" en vez de una fila en blanco. esSinMarca
    // se guarda aparte (no comparar el string "Sin marca") porque el valor real en la
    // API es '' -- /analisis/stock-ventas?marca=Sin marca no matchea esos productos
    // (ver rtMarcaDetalle: ahi se bloquea "Ver productos" para este caso).
    const esSinMarca = !(m.marca && m.marca.trim());
    return {
      marca: esSinMarca ? 'Sin marca' : m.marca,
      esSinMarca,
      ventas, stock,
      variantes: m.variantes || 0,
      participacion: totalVentas > 0 ? ventas / totalVentas : null,
      rotacion: disp > 0 ? ventas / disp : null,
    };
  });
}

function rtMarcasAplicarBusqueda(datos) {
  if (!RT_MARCAS_BUSQUEDA) return datos;
  const q = norm(RT_MARCAS_BUSQUEDA);
  return datos.filter(m => norm(m.marca).includes(q));
}

function rtMarcasOrdenar(datos) {
  const { campo, dir } = RT_MARCAS_ORDEN;
  const copia = datos.slice();
  copia.sort((a, b) => {
    const x = a[campo], y = b[campo];
    if (x == null && y == null) return 0;
    if (x == null) return 1; // nulos (rotacion/participacion sin datos) siempre al final
    if (y == null) return -1;
    if (typeof x === 'string') return dir * x.localeCompare(y, 'es');
    return dir * (x - y);
  });
  return copia;
}

function rtMarcasOrdenarPor(campo) {
  if (RT_MARCAS_ORDEN.campo === campo) RT_MARCAS_ORDEN.dir *= -1;
  else RT_MARCAS_ORDEN = { campo, dir: campo === 'marca' ? 1 : -1 };
  RT_MARCAS_PAGINA = 0;
  rtRenderVistaActual();
}

function rtMarcasBuscar(valor) {
  RT_MARCAS_BUSQUEDA = valor;
  RT_MARCAS_PAGINA = 0;
  rtRenderVistaActual();
}

// Selecciona/deselecciona (toggle) una marca -- resalta en grafico de barras, dona y
// tabla, y muestra el panel de detalle. Re-renderiza sobre datos ya en memoria, nunca
// pide de nuevo /analisis/resumen.
function rtMarcasSeleccionar(marca) {
  RT_MARCAS_SELECCIONADA = (RT_MARCAS_SELECCIONADA === marca) ? null : marca;
  rtRenderVistaActual();
}

function renderRTMarcas(host) {
  if (RT_RESUMEN_LOADING) return rtEstado(host, 'loading', 'Cargando marcas del período...');
  if (RT_RESUMEN_ERROR) return rtEstado(host, 'error', 'No se pudo cargar. ' + RT_RESUMEN_ERROR, rtCargarResumen);
  if (!RT_RESUMEN) return rtEstado(host, 'vacio', 'Sin datos.');

  const datos = rtMarcasDatos();
  if (!datos.length) return rtEstado(host, 'vacio', 'Sin marcas con actividad en el período.');

  const truncado = (RT_RESUMEN.por_marca || []).length >= 100;

  const header = rtEl('div', { className:'rt-marcas-header' });
  header.appendChild(rtEl('h3', { text:'Análisis por marca', className:'rt-subtitulo' }));
  header.appendChild(rtEl('p', { text:'Ventas, stock y rotación por marca del período seleccionado.' }));
  header.appendChild(rtEl('p', { className:'rt-note', text:
    rtFmtFecha(RT_DESDE) + ' – ' + rtFmtFecha(RT_HASTA) + ' · ' + nf.format(datos.length) +
    (datos.length === 1 ? ' marca encontrada' : ' marcas encontradas') +
    (truncado ? ' (la API devuelve como máximo 100 por período, ordenadas por ventas)' : '')
  }));
  host.appendChild(header);

  rtMarcasKPIs(host, datos, truncado);

  const grid = rtEl('div', { className:'dash-grid' });
  rtGraficoBarrasMarcas(grid, datos);
  rtGraficoDonaMarcas(grid, datos, truncado);
  host.appendChild(grid);

  rtInsightsMarcas(host, datos, truncado);

  if (RT_MARCAS_SELECCIONADA) {
    const sel = datos.find(m => m.marca === RT_MARCAS_SELECCIONADA);
    if (sel) rtMarcaDetalle(host, sel);
  }

  rtTablaMarcas(host, datos);
}

// Ventas totales y Stock total salen de RT_RESUMEN.totales (mismo dato que el Dashboard,
// ya neto de INSUMOS/SEÑAS -- ver ADR-030): son el total real del periodo, no la suma de
// por_marca, que puede venir truncada a 100 marcas. Marcas activas y Variantes totales SI
// se calculan sobre por_marca porque son inherentemente "de las marcas listadas".
function rtMarcasKPIs(host, datos, truncado) {
  const t = RT_RESUMEN.totales;
  const tAnterior = RT_RESUMEN_ANTERIOR ? RT_RESUMEN_ANTERIOR.totales : null;
  const marcasActivas = datos.filter(m => m.ventas > 0).length;
  const variantesTotales = datos.reduce((a, m) => a + m.variantes, 0);
  const sufijo = truncado ? ' (100+)' : '';

  const kpis = rtEl('div', { className:'rt-kpis rt-marcas-kpis' });
  kpis.appendChild(rtTarjetaKPI({ label:'Ventas totales', valor:t.Ventas_total, icon:'shoppingCart',
    deltaActual:t.Ventas_total, deltaAnterior: tAnterior && tAnterior.Ventas_total }));
  kpis.appendChild(rtTarjetaKPI({ label:'Stock total', valor:t.Stock_total, icon:'package' }));
  kpis.appendChild(rtTarjetaKPI({ label:'Marcas activas' + sufijo, valor:marcasActivas, icon:'shoppingBag' }));
  kpis.appendChild(rtTarjetaKPI({ label:'Variantes totales' + sufijo, valor:variantesTotales, icon:'barChart3' }));
  host.appendChild(kpis);
}

// Grafico de barras horizontales, 100% CSS (ancho en % del maximo mostrado) -- no hay
// libreria de graficos cargada en esta app y no se agrega ninguna.
function rtGraficoBarrasMarcas(host, datos) {
  const panel = rtEl('div', { className:'card' });
  const head = rtEl('div', { className:'rt-panel-head' });
  head.appendChild(rtEl('h3', { text:'Ventas por marca', className:'rt-subtitulo' }));
  const toggle = rtEl('div', { className:'rt-chart-toggle', attrs:{ role:'group', 'aria-label':'Cantidad de marcas a mostrar en el gráfico' } });
  [[10, 'Top 10'], [20, 'Top 20'], ['todas', 'Todas']].forEach(([valor, etiqueta]) => {
    const activo = RT_MARCAS_TOP_GRAFICO === valor;
    const btn = rtEl('button', { className:'btn-sm' + (activo ? ' rt-kpi-activo' : ''), text: etiqueta });
    btn.type = 'button';
    btn.setAttribute('aria-pressed', String(activo));
    btn.addEventListener('click', () => { RT_MARCAS_TOP_GRAFICO = valor; rtRenderVistaActual(); });
    toggle.appendChild(btn);
  });
  head.appendChild(toggle);
  panel.appendChild(head);

  const ordenadas = datos.slice().sort((a, b) => b.ventas - a.ventas);
  const cantidad = RT_MARCAS_TOP_GRAFICO === 'todas' ? ordenadas.length : Math.min(RT_MARCAS_TOP_GRAFICO, ordenadas.length);
  const mostrar = ordenadas.slice(0, cantidad);
  const max = mostrar.reduce((a, m) => Math.max(a, m.ventas), 0) || 1;

  const lista = rtEl('div', { className:'rt-barras-lista' });
  if (!mostrar.length) {
    rtEstado(lista, 'vacio', 'Sin marcas con ventas en el período.');
  } else {
    mostrar.forEach(m => {
      const fila = rtEl('button', { className:'rt-barra-fila' + (RT_MARCAS_SELECCIONADA === m.marca ? ' rt-marcas-activa' : '') });
      fila.type = 'button';
      const detalleTxt = nf.format(m.ventas) + ' ventas, ' + nf.format(m.stock) + ' de stock, ' +
        nf.format(m.variantes) + ' variantes' + (m.participacion != null ? ', ' + pct(m.participacion) + ' de participación' : '');
      fila.setAttribute('aria-label', m.marca + ': ' + detalleTxt);
      fila.setAttribute('title', m.marca + ' — ' + detalleTxt);
      fila.appendChild(rtEl('span', { className:'rt-barra-nombre', text: m.marca }));
      const track = rtEl('span', { className:'rt-barra-track' });
      track.appendChild(rtEl('span', { className:'rt-barra-fill', attrs:{ style:'width:' + ((m.ventas / max) * 100).toFixed(1) + '%' } }));
      fila.appendChild(track);
      fila.appendChild(rtEl('span', { className:'rt-barra-valor', text: nf.format(m.ventas) }));
      fila.addEventListener('click', () => rtMarcasSeleccionar(m.marca));
      lista.appendChild(fila);
    });
  }
  panel.appendChild(lista);
  host.appendChild(panel);
}

// Dona 100% CSS (conic-gradient + circulo blanco superpuesto para el agujero central,
// sin SVG ni libreria). Top 6 marcas + "Otras" agrupando el resto con datos reales (suma
// de ventas del resto, no una estimacion visual). Paleta fija de RT_MARCAS_PALETA.
function rtGraficoDonaMarcas(host, datos, truncado) {
  const panel = rtEl('div', { className:'card' });
  panel.appendChild(rtEl('h3', { text:'Participación de ventas', className:'rt-subtitulo' }));

  const conVentas = datos.filter(m => m.ventas > 0).sort((a, b) => b.ventas - a.ventas);
  const totalDona = conVentas.reduce((a, m) => a + m.ventas, 0);
  if (!conVentas.length || totalDona <= 0) {
    // rtEstado() hace container.replaceChildren() -- si se le pasa "panel" directo se
    // borra tambien el <h3> ya agregado arriba. Se usa un contenedor propio para el
    // mensaje y se deja el titulo del panel intacto.
    const vacio = rtEl('div');
    rtEstado(vacio, 'vacio', 'Sin ventas para calcular participación.');
    panel.appendChild(vacio);
    host.appendChild(panel);
    return;
  }

  const TOP_DONA = 6;
  const principales = conVentas.slice(0, TOP_DONA);
  const resto = conVentas.slice(TOP_DONA);
  const ventasOtras = resto.reduce((a, m) => a + m.ventas, 0);
  const segmentos = principales.map((m, i) => ({ nombre: m.marca, ventas: m.ventas, color: RT_MARCAS_PALETA[i] }));
  if (ventasOtras > 0) {
    segmentos.push({ nombre: 'Otras (' + nf.format(resto.length) + ' marcas)', ventas: ventasOtras, color: RT_MARCAS_COLOR_OTRAS, esOtras: true });
  }

  let acumulado = 0;
  const stops = segmentos.map(s => {
    const desde = (acumulado / totalDona) * 100;
    acumulado += s.ventas;
    const hasta = (acumulado / totalDona) * 100;
    return s.color + ' ' + desde.toFixed(2) + '% ' + hasta.toFixed(2) + '%';
  }).join(', ');

  const wrap = rtEl('div', { className:'rt-dona-wrap' });
  const circulo = rtEl('div', {
    className:'rt-dona-circulo',
    attrs:{
      style:'background:conic-gradient(' + stops + ')',
      role:'img',
      'aria-label':'Distribución de ventas por marca: ' + segmentos.map(s => s.nombre + ' ' + pct(s.ventas / totalDona)).join(', '),
    },
  });
  const centro = rtEl('div', { className:'rt-dona-centro' });
  centro.appendChild(rtEl('b', { text: nf.format(totalDona) }));
  centro.appendChild(rtEl('span', { text: truncado ? 'unid. (marcas listadas)' : 'unidades' }));
  circulo.appendChild(centro);
  wrap.appendChild(circulo);

  const leyenda = rtEl('div', { className:'rt-dona-leyenda' });
  segmentos.forEach(s => {
    const participacionTxt = pct(s.ventas / totalDona);
    const item = rtEl('button', { className:'rt-dona-item' + (RT_MARCAS_SELECCIONADA === s.nombre ? ' rt-marcas-activa' : '') });
    item.type = 'button';
    item.setAttribute('aria-label', s.nombre + ': ' + nf.format(s.ventas) + ' ventas, ' + participacionTxt);
    item.setAttribute('title', s.nombre + ' — ' + nf.format(s.ventas) + ' (' + participacionTxt + ')');
    item.appendChild(rtEl('span', { className:'rt-dona-chip', attrs:{ style:'background:' + s.color } }));
    item.appendChild(rtEl('span', { className:'rt-dona-item-nombre', text: s.nombre }));
    item.appendChild(rtEl('span', { className:'rt-dona-item-valor', text: participacionTxt }));
    if (s.esOtras) {
      item.disabled = true; // agrupa varias marcas -- no hay una sola marca que seleccionar
    } else {
      item.addEventListener('click', () => rtMarcasSeleccionar(s.nombre));
    }
    leyenda.appendChild(item);
  });
  wrap.appendChild(leyenda);
  panel.appendChild(wrap);
  host.appendChild(panel);
}

// Umbral minimo de ventas para "mejor rotacion": ver RT_MARCAS_ROTACION_VENTAS_MIN
// (declarada junto al resto del estado de Marcas), documentado tambien acá porque es
// el unico lugar donde se usa.
function rtInsightsMarcas(host, datos, truncado) {
  const panel = rtEl('div', { className:'card' });
  panel.appendChild(rtEl('h3', { text:'Insights de marcas', className:'rt-subtitulo' }));
  const lista = rtEl('div', { className:'rt-insights-lista' });
  const conVentas = datos.filter(m => m.ventas > 0);

  // 1) Marca con mayores ventas
  if (conVentas.length) {
    const top = conVentas.slice().sort((a, b) => b.ventas - a.ventas)[0];
    lista.appendChild(rtInsightFila('shoppingCart', 'up', '<b>' + esc(top.marca) + '</b> es la marca con más ventas (' + esc(nf.format(top.ventas)) + ' unidades).'));
  } else {
    lista.appendChild(rtInsightFila('shoppingCart', '', 'Sin marcas con ventas en el período.'));
  }

  // 2) Marca con mayor stock
  const conStock = datos.filter(m => m.stock > 0);
  if (conStock.length) {
    const topStock = conStock.slice().sort((a, b) => b.stock - a.stock)[0];
    lista.appendChild(rtInsightFila('package', '', '<b>' + esc(topStock.marca) + '</b> tiene el mayor stock (' + esc(nf.format(topStock.stock)) + ' unidades).'));
  } else {
    lista.appendChild(rtInsightFila('package', '', 'Sin datos de stock por marca.'));
  }

  // 3) Marca con mejor rotacion, con umbral minimo de ventas (evita que una marca con
  // 1 venta y 0 stock -- rotacion=100% -- encabece el ranking de forma enganosa)
  const candidatas = datos.filter(m => m.ventas >= RT_MARCAS_ROTACION_VENTAS_MIN && m.rotacion != null);
  if (candidatas.length) {
    const mejor = candidatas.slice().sort((a, b) => b.rotacion - a.rotacion)[0];
    lista.appendChild(rtInsightFila('barChart3', 'up', '<b>' + esc(mejor.marca) + '</b> tiene la mejor rotación (' +
      esc(pct(mejor.rotacion)) + ', con al menos ' + RT_MARCAS_ROTACION_VENTAS_MIN + ' ventas en el período).'));
  } else {
    lista.appendChild(rtInsightFila('barChart3', '', 'Ninguna marca alcanza el mínimo de ' + RT_MARCAS_ROTACION_VENTAS_MIN + ' ventas para calcular la mejor rotación.'));
  }

  // 4) Concentracion de las 3 principales marcas (sobre Ventas_total real, no la suma de por_marca)
  const totalVentas = RT_RESUMEN.totales.Ventas_total;
  if (totalVentas > 0 && conVentas.length) {
    const top3 = conVentas.slice().sort((a, b) => b.ventas - a.ventas).slice(0, 3);
    const ventasTop3 = top3.reduce((a, m) => a + m.ventas, 0);
    lista.appendChild(rtInsightFila('circleCheck', '', 'Las <b>' + top3.length + ' marcas principales</b> concentran el <b>' +
      esc(pct(ventasTop3 / totalVentas)) + '</b> de las ventas del período.'));
  } else {
    lista.appendChild(rtInsightFila('circleCheck', '', 'Sin datos suficientes para calcular concentración.'));
  }

  // 5) Marcas sin ventas -- solo identificable dentro de lo que devuelve la API (top 100
  // por ventas); si esta truncado puede haber mas marcas sin ventas fuera de esa lista.
  const sinVentas = datos.filter(m => m.ventas === 0).length;
  lista.appendChild(rtInsightFila('info', '', '<b>' + esc(nf.format(sinVentas)) + '</b> ' +
    (sinVentas === 1 ? 'marca' : 'marcas') + ' sin ventas en el período' +
    (truncado ? ' (dentro de las marcas devueltas por la API; puede haber más fuera del top 100)' : '') + '.'));

  panel.appendChild(lista);
  host.appendChild(panel);
}

// Panel de detalle compacto (no fila expandida: la marca seleccionada puede no estar en
// la pagina actual de la tabla, un panel aparte evita ese problema por completo).
function rtMarcaDetalle(host, m) {
  const panel = rtEl('div', { className:'card rt-marcas-detalle' });
  const head = rtEl('div', { className:'rt-marcas-detalle-head' });
  head.appendChild(rtEl('div', { className:'rt-marcas-detalle-titulo', text: m.marca }));
  const cerrar = rtEl('button', { className:'btn-sm', attrs:{ 'aria-label':'Cerrar detalle de ' + m.marca } });
  cerrar.type = 'button';
  cerrar.innerHTML = icon('x', 'icon-16'); // icono estatico del helper
  cerrar.addEventListener('click', () => rtMarcasSeleccionar(m.marca));
  head.appendChild(cerrar);
  panel.appendChild(head);

  const grid = rtEl('div', { className:'rt-marcas-detalle-grid' });
  const item = (label, valor) => {
    const div = rtEl('div', { className:'rt-marcas-detalle-item' });
    div.appendChild(rtEl('div', { className:'kl', text: label }));
    div.appendChild(rtEl('div', { className:'kv', text: valor }));
    grid.appendChild(div);
  };
  item('Ventas', nf.format(m.ventas));
  item('Participación', m.participacion != null ? pct(m.participacion) : '—');
  item('Stock', nf.format(m.stock));
  item('Variantes', nf.format(m.variantes));
  item('Rotación', m.rotacion != null ? pct(m.rotacion) : '—');
  panel.appendChild(grid);

  const ctaWrap = rtEl('div', { className:'rt-marcas-detalle-cta' });
  if (m.esSinMarca) {
    // "Sin marca" es un fallback de UI para nombre_marca='' -- /analisis/stock-ventas
    // filtra con LIKE, no matchea la cadena vacia real, asi que navegar con
    // { marca:'Sin marca' } no encontraria esos productos. Se explica en vez de navegar,
    // sin tocar el backend ni el contrato del filtro.
    ctaWrap.appendChild(rtEl('p', { className:'rt-note', text:
      'Estos productos no tienen una marca válida asignada en el catálogo — no se puede filtrar Productos por este valor.' }));
  } else {
    const btnVer = rtBotonIcono('btn-primary', 'search', 'Ver productos de esta marca');
    // Reutiliza rtAplicarFiltroYVer (ya existente, usado por Marcas/Rubros/Subrubros) --
    // aplica { marca } como filtro y navega a Productos con paginacion, sin consulta masiva
    // sin filtro. No se duplica logica de filtros entre Marcas y Productos.
    btnVer.addEventListener('click', () => rtAplicarFiltroYVer({ marca: m.marca }, 'Marcas'));
    ctaWrap.appendChild(btnVer);
  }
  panel.appendChild(ctaWrap);

  host.appendChild(panel);
}

function rtTablaMarcas(host, datos) {
  const toolbar = rtEl('div', { className:'rt-marcas-toolbar' });

  const searchWrap = rtEl('div', { className:'rt-marcas-search' });
  const searchIcon = rtEl('span', { attrs:{ 'aria-hidden':'true' } });
  searchIcon.innerHTML = icon('search', ''); // icono estatico del helper
  searchWrap.appendChild(searchIcon);
  const searchInput = rtEl('input', { attrs:{ type:'text', placeholder:'Buscar marca…', 'aria-label':'Buscar marca', id:'rtMarcasBuscador' } });
  searchInput.value = RT_MARCAS_BUSQUEDA;
  // Filtra los datos ya cargados en memoria -- nunca dispara una consulta nueva por tecla.
  // rtRenderVistaActual() reconstruye todo #rtPanelHost (incluido este input), asi que sin
  // restaurar foco+cursor a mano el usuario perderia el foco despues de cada letra.
  searchInput.addEventListener('input', () => {
    const cursor = searchInput.selectionStart;
    RT_MARCAS_BUSQUEDA = searchInput.value;
    RT_MARCAS_PAGINA = 0;
    rtRenderVistaActual();
    const nuevo = document.getElementById('rtMarcasBuscador');
    if (nuevo) { nuevo.focus(); try { nuevo.setSelectionRange(cursor, cursor); } catch (e) {} }
  });
  searchWrap.appendChild(searchInput);
  if (RT_MARCAS_BUSQUEDA) {
    const clear = rtEl('button', { className:'rt-marcas-search-clear', attrs:{ 'aria-label':'Limpiar búsqueda' } });
    clear.type = 'button';
    clear.innerHTML = icon('x', 'icon-16');
    clear.addEventListener('click', () => rtMarcasBuscar(''));
    searchWrap.appendChild(clear);
  }
  toolbar.appendChild(searchWrap);

  const filasSel = rtEl('div', { className:'rt-marcas-filas-sel' });
  filasSel.appendChild(rtEl('label', { text:'Filas por página', attrs:{ for:'rtMarcasFilas' } }));
  const select = rtEl('select', { attrs:{ id:'rtMarcasFilas', 'aria-label':'Filas por página' } });
  [10, 25, 50].forEach(n => {
    const opt = rtEl('option', { text:String(n), attrs:{ value:String(n) } });
    if (n === RT_MARCAS_FILAS_POR_PAGINA) opt.selected = true;
    select.appendChild(opt);
  });
  select.addEventListener('change', () => { RT_MARCAS_FILAS_POR_PAGINA = Number(select.value); RT_MARCAS_PAGINA = 0; rtRenderVistaActual(); });
  filasSel.appendChild(select);
  toolbar.appendChild(filasSel);
  host.appendChild(toolbar);

  const filtrados = rtMarcasAplicarBusqueda(datos);
  if (!filtrados.length) {
    const vacioHost = rtEl('div', { className:'card' });
    rtEstado(vacioHost, 'vacio', RT_MARCAS_BUSQUEDA
      ? 'Sin marcas que coincidan con "' + RT_MARCAS_BUSQUEDA + '".'
      : 'Sin marcas para mostrar.');
    host.appendChild(vacioHost);
    return;
  }

  const ordenados = rtMarcasOrdenar(filtrados);
  const total = ordenados.length;
  const totalPaginas = Math.max(1, Math.ceil(total / RT_MARCAS_FILAS_POR_PAGINA));
  if (RT_MARCAS_PAGINA >= totalPaginas) RT_MARCAS_PAGINA = totalPaginas - 1;
  const offset = RT_MARCAS_PAGINA * RT_MARCAS_FILAS_POR_PAGINA;
  const pagina = ordenados.slice(offset, offset + RT_MARCAS_FILAS_POR_PAGINA);

  const wrap = rtEl('div', { className:'rt-table-wrap' });
  const table = rtEl('table', { className:'rt-table' });
  const thead = rtEl('thead');
  const trh = rtEl('tr');
  [['marca', 'Marca'], ['ventas', 'Ventas'], ['participacion', 'Participación'],
   ['stock', 'Stock'], ['variantes', 'Variantes'], ['rotacion', 'Rotación']].forEach(([campo, etiqueta]) => {
    const sorted = RT_MARCAS_ORDEN.campo === campo;
    const th = rtEl('th', { className:'rt-th-ordenable' + (sorted ? ' rt-th-sorted' : ''),
      attrs:{ 'aria-sort': sorted ? (RT_MARCAS_ORDEN.dir < 0 ? 'descending' : 'ascending') : 'none' } });
    const btn = rtEl('button', { className:'rt-th-btn' });
    btn.type = 'button';
    btn.appendChild(document.createTextNode(etiqueta));

  btnSig.addEventListener('click', () => { RT_MARCAS_PAGINA++; rtRenderVistaActual(); });

  host.appendChild(pag);

// Agrupa las variantes (filas de /stock-ventas) por Codigo_producto. Cada fila ya es
// unica por cod+talle+color (garantizado en la SQL), asi que sumar por grupo nunca
// cuenta una misma variante dos veces.
function rtProductosAgrupar(filas) {
  const mapa = new Map();
  filas.forEach(f => {
    const cod = f.Codigo_producto;
    let g = mapa.get(cod);
    if (!g) {
      g = { codigo:cod, producto:f.Nombre_producto, marca:f.Nombre_marca, rubro:f.Nombre_rubro,
        subrubro:f.Nombre_subrubro, precio:f.Precio, costo:f.Precio_costo,
        ventas:0, stock:0, variantes:0, ultimoIngreso:null, filas:[] };
      mapa.set(cod, g);
    }
    g.ventas += f.Ventas_total || 0;
    g.stock += f.Stock_total || 0;
    g.variantes += 1;
    g.filas.push(f);
    if (f.Ultimo_ingreso) {
      const fecha = new Date(f.Ultimo_ingreso);
      if (!isNaN(fecha) && (!g.ultimoIngreso || fecha > g.ultimoIngreso)) g.ultimoIngreso = fecha;
    }
  });
  return [...mapa.values()];
}

function rtProductosAplicarBusqueda(grupos) {
  if (!RT_PRODUCTOS_BUSQUEDA) return grupos;
  const q = norm(RT_PRODUCTOS_BUSQUEDA);
  return grupos.filter(g =>
    norm(g.codigo).includes(q) || norm(g.producto).includes(q) || norm(g.marca).includes(q) ||
    norm(g.rubro).includes(q) || norm(g.subrubro).includes(q)
  );
}

// Orden inicial ventas desc, codigo asc como desempate -- se aplica siempre, no solo
// cuando no hay otro criterio, para que el orden nunca dependa de la posicion original.
function rtProductosOrdenar(grupos) {
  const { campo, dir } = RT_PRODUCTOS_ORDEN;
  const copia = grupos.slice();
  copia.sort((a, b) => {
    let x = a[campo], y = b[campo];
    if (campo === 'ultimoIngreso') { x = x ? x.getTime() : -Infinity; y = y ? y.getTime() : -Infinity; }
    let cmp;
    if (x == null && y == null) cmp = 0;
    else if (x == null) cmp = 1;
    else if (y == null) cmp = -1;
    else if (typeof x === 'string') cmp = dir * x.localeCompare(y, 'es');
    else cmp = dir * (x - y);
    return cmp !== 0 ? cmp : a.codigo.localeCompare(b.codigo, 'es');
  });
  return copia;
}

function rtProductosOrdenarPor(campo) {
  if (RT_PRODUCTOS_ORDEN.campo === campo) RT_PRODUCTOS_ORDEN.dir *= -1;
  else RT_PRODUCTOS_ORDEN = { campo, dir: (campo === 'codigo' || campo === 'producto' || campo === 'marca') ? 1 : -1 };
  RT_PRODUCTOS_PAGINA = 0;
  rtRenderVistaActual();
}

function rtProductosBuscar(valor) {
  RT_PRODUCTOS_BUSQUEDA = valor;
  RT_PRODUCTOS_PAGINA = 0;
  rtRenderVistaActual();
}

function rtProductosExpandir(codigo) {
  const esOtroProducto = RT_PRODUCTOS_EXPANDIDO !== codigo;
  RT_PRODUCTOS_EXPANDIDO = (RT_PRODUCTOS_EXPANDIDO === codigo) ? null : codigo;
  if (esOtroProducto) RT_PRODUCTOS_VARIANTES_ORDEN = { campo:null, dir:-1 };
  rtRenderVistaActual();
}

function rtProductosOrdenarVariantesPor(campo) {
  if (RT_PRODUCTOS_VARIANTES_ORDEN.campo === campo) RT_PRODUCTOS_VARIANTES_ORDEN.dir *= -1;
  else RT_PRODUCTOS_VARIANTES_ORDEN = { campo, dir: (campo === 'talle' || campo === 'color') ? 1 : -1 };
  rtRenderVistaActual();
}

function rtProductosThOrdenable(etiqueta, campoId, ordenActual, onClick) {
  const sorted = ordenActual.campo === campoId;
  const th = rtEl('th', { className:'rt-th-ordenable' + (sorted ? ' rt-th-sorted' : ''),
    attrs:{ 'aria-sort': sorted ? (ordenActual.dir < 0 ? 'descending' : 'ascending') : 'none' } });
  const btn = rtEl('button', { className:'rt-th-btn' });
  btn.type = 'button';
  btn.appendChild(document.createTextNode(etiqueta));
  btn.appendChild(rtEl('span', { className:'rt-th-arrow', text: sorted ? (ordenActual.dir < 0 ? '▼' : '▲') : '↕' }));
  btn.addEventListener('click', onClick);
  th.appendChild(btn);
  return th;
}

// Tabla de variantes dentro del detalle de un producto -- talle/color como texto
// (nunca numero), "—" para ausentes, filas con stock 0 atenuadas (.rt-fila-sinstock,
// ya existia en el DS) sin ocultarlas.
function rtProductosTablaVariantes(g) {
  if (!g.filas.length) return rtEl('p', { className:'rt-note', text:'Sin variantes para este producto.' });

  const filas = g.filas.slice();
  const { campo, dir } = RT_PRODUCTOS_VARIANTES_ORDEN;
  if (campo === 'talle') filas.sort((a, b) => dir * sizeSort(a.Codigo_talle, b.Codigo_talle));
  else if (campo === 'color') filas.sort((a, b) => dir * String(a.Nombre_color || a.Codigo_color || '').localeCompare(String(b.Nombre_color || b.Codigo_color || ''), 'es'));
  else if (campo === 'ventas') filas.sort((a, b) => dir * ((a.Ventas_total || 0) - (b.Ventas_total || 0)));
  else if (campo === 'stock') filas.sort((a, b) => dir * ((a.Stock_total || 0) - (b.Stock_total || 0)));

  const wrap = rtEl('div', { className:'rt-table-wrap' });
  const table = rtEl('table', { className:'rt-table' });
  const thead = rtEl('thead'); const trh = rtEl('tr');
  trh.appendChild(rtProductosThOrdenable('Talle', 'talle', RT_PRODUCTOS_VARIANTES_ORDEN, () => rtProductosOrdenarVariantesPor('talle')));
  trh.appendChild(rtEl('th', { text:'Código color' }));
  trh.appendChild(rtProductosThOrdenable('Nombre color', 'color', RT_PRODUCTOS_VARIANTES_ORDEN, () => rtProductosOrdenarVariantesPor('color')));
  trh.appendChild(rtProductosThOrdenable('Ventas', 'ventas', RT_PRODUCTOS_VARIANTES_ORDEN, () => rtProductosOrdenarVariantesPor('ventas')));
  trh.appendChild(rtProductosThOrdenable('Stock', 'stock', RT_PRODUCTOS_VARIANTES_ORDEN, () => rtProductosOrdenarVariantesPor('stock')));
  trh.appendChild(rtEl('th', { text:'Depósito' }));
  trh.appendChild(rtEl('th', { text:'Último ingreso' }));
  thead.appendChild(trh); table.appendChild(thead);

  const tbody = rtEl('tbody');
  filas.forEach(f => {
    const sinStock = (f.Stock_total || 0) <= 0;
    const tr = rtEl('tr', { className: sinStock ? 'rt-fila-sinstock' : '' });
    tr.appendChild(rtEl('td', { text: f.Codigo_talle != null && f.Codigo_talle !== '' ? String(f.Codigo_talle) : '—' }));
    tr.appendChild(rtEl('td', { text: f.Codigo_color != null && f.Codigo_color !== '' ? String(f.Codigo_color) : '—' }));
    tr.appendChild(rtEl('td', { text: f.Nombre_color || '—' }));
    tr.appendChild(rtEl('td', { className:'nr', text: nf.format(f.Ventas_total || 0) }));
    tr.appendChild(rtEl('td', { className:'nr', text: nf.format(f.Stock_total || 0) }));
    tr.appendChild(rtEl('td', { className:'nr', text: nf.format(f.Stock_ctro_0000 || 0) }));
    tr.appendChild(rtEl('td', { text: f.Ultimo_ingreso ? rtFmtFecha(f.Ultimo_ingreso) : '—' }));
    tbody.appendChild(tr);
  });
  table.appendChild(tbody);
  wrap.appendChild(table);
  return wrap;
}

// (barras horizontales compactas, mismo patron visual que las barras de Marcas) y la

// la API ya devuelve (Ventas_ctro_XXXX/Stock_ctro_XXXX/Stock_ctro_0000, nunca undefined

function rtProductosDetalle(g) {
