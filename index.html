<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Croma · Análisis</title>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data: https:; connect-src https://stock-api.croma-app.com.ar;">
  <meta name="referrer" content="no-referrer">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="croma-ds.css?v=20260714-1">
  <style>
    /* --black/--white/--gray-*/--accent ya vienen de croma-ds.css (valores idénticos,
       una sola fuente de verdad). Acá solo lo que croma-ds.css no define: colores
       semánticos propios de Análisis (mismos valores que --success/--danger/--warning
       de la DS, con otro nombre porque ya se usan así en todo el archivo) y los
       colores de sucursal existentes (se mantienen tal cual, no los de croma-ds.css —
       ver BRIEF/decisión 2026-07-13). */
    :root {
      --accent-s:#fde8e6;
      --sold:#16a34a; --sold-s:#dcfce7;
      --risk:#dc2626; --risk-s:#fee2e2;
      --amber:#d97706; --amber-s:#fef3c7;
      --violet:#7c3aed; --violet-s:#ede9fe;
      --teal:#0891b2; --teal-s:#cffafe;
      --suc-01:#185FA5; --suc-01-s:#E6F1FB;
      --suc-05:#0F6E56; --suc-05-s:#E1F5EE;
      --suc-09:#B45309; --suc-09-s:#FEF3C7;
      --suc-10:#9B2563; --suc-10-s:#FCE7F3;
      --suc-12:#534AB7; --suc-12-s:#EEEDFE;
      --suc-14:#3B6D11; --suc-14-s:#EAF3DE;
      --font-d: var(--font-display);
      --font-b: var(--font-body);
      --r: var(--radius-lg);
      --sh:0 1px 3px rgba(0,0,0,.08),0 4px 16px -4px rgba(0,0,0,.08);
    }
    a:focus-visible, button:focus-visible, input:focus-visible, select:focus-visible, [tabindex]:focus-visible {
      outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 6px;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{-webkit-text-size-adjust:100%}
    body{font-family:var(--font-b);background:var(--gray-50);color:var(--black);
      line-height:1.45;font-variant-numeric:tabular-nums;-webkit-font-smoothing:antialiased;min-height:100vh}

    #authCheck{position:fixed;inset:0;background:var(--black);display:flex;align-items:center;
      justify-content:center;flex-direction:column;gap:16px;z-index:9999}
    #authCheck p{color:var(--gray-400);font-size:13px}
    .spinner{width:28px;height:28px;border:2px solid rgba(255,255,255,.15);
      border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}

    .topbar{position:sticky;top:0;z-index:100;display:flex;align-items:center;gap:1.25rem;
      padding:0 2.25rem;height:64px;
      background:rgba(13,13,13,.96);backdrop-filter:blur(14px);
      box-shadow:0 6px 24px rgba(0,0,0,.20)}
    .brand{display:flex;align-items:center;gap:8px;min-width:max-content}
    .brand-tridente{height:26px;width:auto;display:block}
    .brand-logo{font-family:var(--font-d);font-size:26px;letter-spacing:3px;line-height:1;color:#fff}
    .brand-divider{color:var(--gray-600);font-size:14px}
    .brand-section{font-size:11px;font-weight:500;letter-spacing:3px;color:var(--gray-400);
      text-transform:uppercase;padding:3px 9px;border:1px solid rgba(255,255,255,.12);border-radius:999px}
    .top-actions{margin-left:auto;display:flex;align-items:center;gap:8px}
    .hbtn{height:32px;padding:0 12px;border-radius:8px;border:1px solid rgba(255,255,255,.12);
      background:rgba(255,255,255,.06);cursor:pointer;font-size:12px;color:var(--gray-400);
      font-family:var(--font-b);transition:.15s;white-space:nowrap}
    .hbtn:hover{border-color:rgba(255,255,255,.30);color:#fff}
    .btn-icon{width:38px;height:38px;display:flex;align-items:center;justify-content:center;
      border:1px solid rgba(255,255,255,.12);border-radius:12px;
      background:rgba(255,255,255,.04);color:var(--gray-400);cursor:pointer;transition:.15s}
    .btn-icon:hover{color:#fff;border-color:#555;background:rgba(255,255,255,.11);transform:translateY(-1px)}
    .sesion-chip{display:flex;align-items:center;gap:8px;padding:5px 10px 5px 12px;
      background:rgba(255,255,255,.09);border:1px solid rgba(255,255,255,.18);border-radius:20px}
    .sesion-nombre{font-size:12px;font-weight:600;color:#e8e8e2;white-space:nowrap;letter-spacing:.2px}
    .sesion-logout{width:24px;height:24px;border-radius:50%;background:rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.15);color:#888;cursor:pointer;display:flex;
      align-items:center;justify-content:center;transition:.15s}
    .sesion-logout:hover{background:#dc2626;border-color:#dc2626;color:#fff}

    .wrap{max-width:1300px;margin:0 auto;padding:20px 20px 80px}
    .err-box{background:var(--risk-s);border:1px solid #fca5a5;color:#991b1b;
      border-radius:12px;padding:12px 16px;font-size:13px;margin:12px 0}

    /* Mode selector */
    .mode-sel{margin-top:8px}
    .mode-sel h2{font-family:var(--font-d);font-size:22px;letter-spacing:1.5px;
      margin-bottom:6px;color:var(--black)}
    .mode-sel p{font-size:13px;color:var(--gray-400);margin-bottom:20px}
    .mode-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;max-width:1020px}
    .mode-card{background:var(--white);border:none;border-radius:var(--radius-xl);
      padding:28px 24px 22px;cursor:pointer;text-align:left;font:inherit;color:inherit;
      transition:.18s;box-shadow:0 4px 20px rgba(0,0,0,.07);position:relative;overflow:hidden}
    .mode-card::before{content:'';position:absolute;top:-24px;right:-24px;width:90px;height:90px;
      border-radius:50%;opacity:.35}
    .mode-card.mc-gen::before{background:radial-gradient(circle,#c4b5fd,transparent 70%)}
    .mode-card.mc-tyc::before{background:radial-gradient(circle,#99f6e4,transparent 70%)}
    .mode-card.mc-rt::before{background:radial-gradient(circle,#f9a8a0,transparent 70%)}
    .mode-card:hover{box-shadow:0 10px 36px rgba(0,0,0,.13);transform:translateY(-3px)}
    .mc-icon{width:64px;height:64px;border-radius:18px;display:grid;place-items:center;
      margin-bottom:14px}
    .mc-icon svg{width:28px;height:28px}
    .mc-gen .mc-icon{background:var(--violet-s);color:var(--violet)}
    .mc-tyc .mc-icon{background:var(--teal-s);color:var(--teal)}
    .mc-rt .mc-icon{background:var(--accent-s);color:var(--accent)}
    .mc-name{font-weight:700;font-size:16px;margin-bottom:4px}
    .mc-desc{font-size:13px;color:var(--gray-400);line-height:1.55;margin-bottom:16px}
    .mc-go{font-size:12px;font-weight:600;color:var(--gray-600);display:flex;align-items:center;gap:6px}
    .mc-go span{width:28px;height:28px;border-radius:50%;display:grid;place-items:center;font-size:14px}
    .mc-gen .mc-go span{background:var(--violet-s);color:var(--violet)}
    .mc-tyc .mc-go span{background:var(--teal-s);color:var(--teal)}
    .mc-rt .mc-go span{background:var(--accent-s);color:var(--accent)}

    /* Upload zone */
    #uploadZone{background:var(--white);border:2px dashed var(--gray-200);border-radius:24px;
      padding:52px 28px;text-align:center;cursor:pointer;transition:.18s;box-shadow:var(--sh);margin-top:4px}
    #uploadZone:hover,#uploadZone.over{border-color:var(--violet);background:var(--violet-s)}
    #uploadZone.tyc-mode:hover,#uploadZone.tyc-mode.over{border-color:var(--teal);background:var(--teal-s)}
    .up-icon{width:56px;height:56px;border-radius:16px;display:grid;place-items:center;
      margin:0 auto 18px;font-size:26px}
    .up-icon.gen{background:var(--violet-s)}
    .up-icon.tyc{background:var(--teal-s)}
    #uploadZone h2{font-family:var(--font-d);font-size:24px;letter-spacing:1.5px;margin-bottom:8px}
    #uploadZone .up-desc{font-size:13px;color:var(--gray-400);max-width:460px;margin:0 auto 6px}
    #uploadZone .up-hint{font-size:11px;color:var(--gray-400);margin-top:14px;line-height:1.7}
    #uploadZone .up-hint b{color:var(--black)}
    .saved-card{display:flex;align-items:center;gap:16px;background:var(--white);
      border:2px solid var(--gray-200);border-radius:16px;padding:18px 22px;margin-bottom:16px;
      box-shadow:0 2px 12px rgba(0,0,0,.06)}
    .saved-card-icon{font-size:28px;flex:none}
    .saved-card-info{flex:1;min-width:0}
    .saved-card-name{font-weight:600;font-size:14px;color:var(--black);
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .saved-card-date{font-size:11px;color:var(--gray-400);margin-top:2px}
    .saved-card-actions{display:flex;gap:8px;flex:none}
    .up-back{font:inherit;font-size:12px;color:var(--gray-400);background:none;border:none;
      cursor:pointer;margin-top:16px;text-decoration:underline}
    .up-back:hover{color:var(--black)}

    /* Filter bar */
    .fbar{background:var(--white);border:1px solid var(--gray-100);border-radius:var(--r);
      padding:12px 16px;box-shadow:var(--sh);margin-bottom:14px;
      display:flex;align-items:flex-end;gap:12px;flex-wrap:wrap}
    .fc{display:flex;flex-direction:column;gap:3px}
    .fc label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--gray-400)}
    .fc input,.fc select{font:inherit;font-size:13px;font-weight:500;
      border:1px solid var(--gray-200);border-radius:8px;padding:6px 10px;
      background:var(--gray-50);color:var(--black)}
    .fc input:focus,.fc select:focus{outline:2px solid var(--violet);outline-offset:1px}
    .fc-search{flex:1;min-width:180px}
    .fc-search input{max-width:100%;width:100%}
    .fc-date input{max-width:145px}
    .fc-sel select{max-width:155px}
    .tog-row{display:flex;gap:12px;flex-wrap:wrap;align-items:center;padding-bottom:4px}
    .tog{display:flex;align-items:center;gap:6px;cursor:pointer;user-select:none}
    .tog input{position:absolute;opacity:0;width:0;height:0}
    .tog-tk{width:34px;height:20px;border-radius:99px;background:var(--gray-200);
      position:relative;transition:.15s;flex:none}
    .tog-tk::after{content:'';position:absolute;width:16px;height:16px;border-radius:50%;
      background:#fff;top:2px;left:2px;transition:.15s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
    .tog input:checked + .tog-tk{background:var(--violet)}
    .tog input:checked + .tog-tk::after{transform:translateX(14px)}
    .tog span{font-size:12px;font-weight:500}
    .fbar-end{margin-left:auto;display:flex;align-items:center;gap:10px;flex-wrap:wrap;padding-bottom:2px}
    .fname{font-size:11.5px;color:var(--gray-400)}
    .fname b{color:var(--black);font-weight:600}
    .mode-badge{font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;
      padding:2px 8px;border-radius:99px}
    .mode-badge.gen{background:var(--violet-s);color:var(--violet)}
    .mode-badge.tyc{background:var(--teal-s);color:var(--teal)}
    .mode-badge.rt{background:var(--accent-s);color:var(--accent)}
    .btn-primary{font:inherit;font-size:13px;font-weight:600;color:#fff;background:var(--black);
      border:none;border-radius:9px;padding:8px 14px;cursor:pointer;transition:.15s;
      display:inline-flex;align-items:center;gap:6px}
    .btn-primary:hover{background:#222}
    .btn-primary svg{width:14px;height:14px;stroke:#fff;flex:none;stroke-linecap:round;stroke-linejoin:round}

    /* KPIs */
    .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(148px,1fr));gap:10px;margin-bottom:14px}
    .kpi{background:var(--white);border:1px solid var(--gray-100);border-radius:var(--r);padding:14px 16px;box-shadow:var(--sh)}
    .kl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--gray-400);margin-bottom:8px;line-height:1.3}
    .kv{font-family:var(--font-d);font-size:28px;letter-spacing:-.01em;line-height:1}
    .ks{font-size:11px;color:var(--gray-400);margin-top:4px}
    .kpi.hero{grid-column:span 2;background:var(--black);color:#fff;border-color:var(--black)}
    .kpi.hero .kl{color:var(--gray-600)}
    .kpi.hero .kv{font-size:36px}
    .kpi.hero .ks{color:#a0a09a}
    .kpi.hero .gauge{height:7px;border-radius:99px;background:rgba(255,255,255,.12);margin-top:10px;overflow:hidden}
    .kpi.hero .gauge span{display:block;height:100%;background:var(--sold);border-radius:99px}

    /* Tabs */
    .tabs{display:flex;gap:3px;background:var(--white);border:1px solid var(--gray-100);
      border-radius:12px;padding:4px;margin:14px 0;overflow-x:auto;scrollbar-width:none;max-width:100%}
    .tabs::-webkit-scrollbar{display:none}
    .tab{font:inherit;font-size:13px;font-weight:600;color:var(--gray-400);background:none;
      border:none;border-radius:8px;padding:7px 14px;cursor:pointer;white-space:nowrap;transition:.13s}
    .tab:hover{color:var(--black)}
    .tab.active{background:var(--black);color:#fff}

    /* Panel */
    .panel{background:var(--white);border:1px solid var(--gray-100);border-radius:var(--r);box-shadow:var(--sh);overflow:hidden}
    .ph{display:flex;align-items:center;justify-content:space-between;gap:12px;
      padding:14px 18px;border-bottom:1px solid var(--gray-100);flex-wrap:wrap}
    .ph h3{font-family:var(--font-d);font-size:17px;letter-spacing:1px}
    .pnote{font-size:12px;color:var(--gray-400)}
    .btn-sm{font:inherit;font-size:12px;font-weight:600;color:var(--black);background:var(--gray-50);
      border:1px solid var(--gray-200);border-radius:8px;padding:5px 12px;cursor:pointer;
      display:inline-flex;align-items:center;gap:5px;transition:.15s}
    .btn-sm:hover{border-color:var(--black)}
    .btn-sm svg{width:13px;height:13px;stroke:currentColor;stroke-linecap:round;stroke-linejoin:round;flex:none}

    /* Table */
    .scroll{overflow-x:auto}
    table{width:100%;border-collapse:collapse;font-size:13px}
    thead th{text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;
      letter-spacing:.06em;color:var(--gray-400);padding:10px 14px;background:var(--gray-50);
      position:sticky;top:0;white-space:nowrap;cursor:pointer;user-select:none;border-bottom:1px solid var(--gray-100)}
    thead th.ns{cursor:default}
    thead th .arr{opacity:.3;font-size:9px;margin-left:3px}
    thead th.sorted .arr{opacity:1;color:var(--black)}
    tbody td{padding:9px 14px;border-top:1px solid var(--gray-100);vertical-align:middle}
    tbody tr:hover{background:#fafaf8}
    .nr{text-align:right;font-weight:600;white-space:nowrap}
    .pname{font-weight:500;max-width:230px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .cod{font-size:11px;color:var(--gray-400);font-weight:600}
    .tag{font-size:11px;font-weight:600;color:var(--gray-600);background:var(--gray-100);
      border:1px solid var(--gray-200);padding:2px 8px;border-radius:99px;white-space:nowrap;display:inline-block}
    .pill{font-weight:700;font-size:11px;padding:2px 8px;border-radius:99px;white-space:nowrap;display:inline-block}
    .pill.g{background:var(--sold-s);color:#15803d}
    .pill.a{background:var(--amber-s);color:#92400e}
    .pill.r{background:var(--risk-s);color:#991b1b}
    .pill.n{background:var(--gray-100);color:var(--gray-600)}
    .rot{display:flex;align-items:center;gap:8px;min-width:150px}
    .rot .bar{flex:1;height:7px;border-radius:99px;background:var(--gray-100);overflow:hidden}
    .rot .bar span{display:block;height:100%;border-radius:99px}
    .rot .pc{font-weight:700;font-size:12px;width:42px;text-align:right;flex:none}
    .pc-lo{color:var(--risk)} .pc-mid{color:var(--amber)} .pc-hi{color:var(--sold)}
    .empty{padding:36px;text-align:center;color:var(--gray-400);font-size:13px}

    /* Sucursal badges */
    .sb{font-size:11px;font-weight:700;padding:2px 9px;border-radius:99px;white-space:nowrap;display:inline-block}
    .s01{color:var(--suc-01);background:var(--suc-01-s)}
    .s05{color:var(--suc-05);background:var(--suc-05-s)}
    .s09{color:var(--suc-09);background:var(--suc-09-s)}
    .s10{color:var(--suc-10);background:var(--suc-10-s)}
    .s12{color:var(--suc-12);background:var(--suc-12-s)}
    .s14{color:var(--suc-14);background:var(--suc-14-s)}

    /* Sub-tabs (Oportunidades) */
    .sub-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
    .stab{font:inherit;font-size:12px;font-weight:600;color:var(--gray-600);
      background:var(--white);border:1px solid var(--gray-200);border-radius:99px;
      padding:5px 13px;cursor:pointer;transition:.13s;white-space:nowrap;
      display:inline-flex;align-items:center;gap:6px}
    .stab:hover{border-color:var(--black);color:var(--black)}
    .stab.active{background:var(--black);color:#fff;border-color:var(--black)}
    .stab.active .pill{background:rgba(255,255,255,.2);color:#fff}

    /* Dashboard mini rows */
    .dash-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:14px}
    .mini-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--gray-100)}
    .mini-row:last-child{border-bottom:none}
    .mini-label{width:130px;font-size:12px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:none}
    .mini-bar{flex:1;height:8px;border-radius:99px;background:var(--gray-100);overflow:hidden}
    .mini-bar span{display:block;height:100%;border-radius:99px}
    .mini-val{font-size:12px;font-weight:700;width:44px;text-align:right;flex:none}
    .mini-pct{font-size:11px;color:var(--gray-400);width:48px;text-align:right;flex:none}

    /* Curva de talles */
    .curva-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--gray-100)}
    .curva-row:last-child{border-bottom:none}
    .curva-talle{width:56px;font-size:13px;font-weight:700;flex:none;text-align:center}
    .curva-bars{flex:1;display:flex;flex-direction:column;gap:3px}
    .curva-bar-wrap{display:flex;align-items:center;gap:6px;height:12px}
    .curva-bar-bg{flex:1;height:12px;border-radius:99px;background:var(--gray-100);overflow:hidden;position:relative}
    .curva-bar-v{position:absolute;left:0;top:0;height:100%;border-radius:99px}
    .curva-bar-s{position:absolute;top:0;height:100%;border-radius:0 99px 99px 0;opacity:.45}
    .curva-nums{width:140px;flex:none;display:flex;gap:8px;font-size:11px}
    .curva-nums span{flex:1;text-align:right;white-space:nowrap}
    .curva-legend{display:flex;gap:14px;font-size:11px;color:var(--gray-400);margin-bottom:10px;padding:0 2px}
    .curva-legend i{display:inline-block;width:10px;height:10px;border-radius:3px;margin-right:4px;vertical-align:-1px}

    .footnote{font-size:11px;color:var(--gray-400);margin-top:12px;line-height:1.7}

    /* Tiempo real — badges de ubicación: sucursal comercial, centro 0000 (DEPO) y
       depósito 90/93 son tres cosas distintas, nunca se mezclan visualmente */
    .sb.s00{color:var(--gray-600);background:var(--gray-100)}
    .sb.dep90{color:var(--amber);background:var(--amber-s)}
    .sb.dep93{color:var(--risk);background:var(--risk-s)}

    .rt-state{padding:40px 20px;text-align:center;color:var(--gray-400);font-size:13px}
    .rt-state .spinner{border:2px solid var(--gray-200);border-top-color:var(--black);margin:0 auto 12px}
    .rt-state .btn-sm{margin-top:12px}
    .rt-note{font-size:11.5px;color:var(--gray-400);padding:10px 16px;border-top:1px solid var(--gray-100);line-height:1.6}

    .rt-search{max-width:480px;margin-bottom:14px}
    .rt-search input{font:inherit;font-size:14px;width:100%;border:1px solid var(--gray-200);
      border-radius:10px;padding:10px 14px;background:var(--white)}
    .rt-search input:focus{outline:2px solid var(--accent);outline-offset:1px}
    .rt-results{display:flex;flex-direction:column;gap:6px;margin-bottom:16px}
    .rt-result-item{display:flex;flex-direction:column;gap:2px;text-align:left;width:100%;
      background:var(--white);border:1px solid var(--gray-100);border-radius:12px;
      padding:10px 14px;cursor:pointer;font:inherit;transition:.13s}
    .rt-result-item:hover{border-color:var(--black);box-shadow:var(--sh)}
    .rt-result-cod{font-size:11px;font-weight:700;color:var(--gray-600)}
    .rt-result-desc{font-size:14px;color:var(--black)}

<script src="croma-icons.js?v=20260714-1"></script>
<script>
'use strict';

const HUB_URL = 'https://croma-app.com.ar/';
// croma-api — stock real desde Sysneo (solo lectura). Requiere que el origen de esta app
// esté sumado a ORIGENES_PERMITIDOS en croma-api/index.js (ya aplicado).
const STOCK_API_URL = 'https://stock-api.croma-app.com.ar';

// Sucursales - general mode (by number code)
const SGEN = [
  { key:'01', name:'01 PASEO',          cls:'s01', color:'#185FA5' },
  { key:'05', name:'05 WAVE',            cls:'s05', color:'#0F6E56' },
  { key:'09', name:'09 CIPO SAN MARTIN', cls:'s09', color:'#B45309' },
  { key:'10', name:'10 PERITO MORENO',   cls:'s10', color:'#9B2563' },
  { key:'12', name:'12 CENTENARIO',      cls:'s12', color:'#534AB7' },
  { key:'14', name:'14 ROCA',            cls:'s14', color:'#3B6D11' },
];

// Sucursales - TyC mode (by name in column headers)
const STYC = [
  { key:'01', colK:'PASEO', name:'01 PASEO',          cls:'s01', color:'#185FA5' },
  { key:'05', colK:'WAVE',  name:'05 WAVE',            cls:'s05', color:'#0F6E56' },
  { key:'09', colK:'CIPO',  name:'09 CIPO SAN MARTIN', cls:'s09', color:'#B45309' },
  { key:'10', colK:'PERITO',name:'10 PERITO MORENO',   cls:'s10', color:'#9B2563' },
  { key:'12', colK:'CENTE', name:'12 CENTENARIO',      cls:'s12', color:'#534AB7' },
  { key:'14', colK:'ROCA',  name:'14 ROCA',            cls:'s14', color:'#3B6D11' },
];

const SIZE_ALPHA = ['XS','S','M','L','XL','XXL','2XL','3XL','UNICA','U','UNI'];
function sizeSort(a, b) {
  const na = Number(a), nb = Number(b);
  if (!isNaN(na) && !isNaN(nb)) return na - nb;
  const ia = SIZE_ALPHA.indexOf(String(a).toUpperCase());
  const ib = SIZE_ALPHA.indexOf(String(b).toUpperCase());
  if (ia >= 0 && ib >= 0) return ia - ib;
  if (ia >= 0) return -1; if (ib >= 0) return 1;
  return String(a).localeCompare(String(b), 'es');
}

const nf  = new Intl.NumberFormat('es-AR');
const nf1 = new Intl.NumberFormat('es-AR', { maximumFractionDigits:1 });
const money  = v => '$' + nf.format(Math.round(v));
const pct    = v => (v * 100).toFixed(1).replace('.', ',') + '%';
const norm   = s => String(s ?? '').replace(/\s+/g,' ').trim().toUpperCase();
const esc    = s => String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const num    = v => { const n = Number(v); return isFinite(n) ? n : 0; };
const fmtD   = d => {
  if (!(d instanceof Date) || isNaN(d)) return '—';
  return String(d.getDate()).padStart(2,'0') + '/' + String(d.getMonth()+1).padStart(2,'0') + '/' + d.getFullYear();
};
const daysDiff = (d, ref) => ref && d ? Math.round((ref.getTime() - d.getTime()) / 864e5) : 0;

let MODE = null; // 'gen' | 'tyc' | 'rt'
let RAW = [], COLS = {}, REF_DATE = null;
let VIEW = '', OPP_SUB = 'parado';
let SORT = { view:null, col:null, dir:-1 };

// ── Tiempo real (croma-api) — estado propio, no comparte nada con RAW/COLS/VIEW ──
let RT_STOCK = null;       // array crudo de /stock (una vez por sesión de modo)
let RT_SUCURSALES = null;  // array crudo de /sucursales
let RT_CENTRO_INFO = null; // Map centro -> { nombre, cls, activa, puntoVenta }
let RT_VIEW = 'dashboard';
let RT_LOADED = false;
let RT_LOADING = false;
let RT_BUSCAR_ULTIMA = null; // { tipo:'buscar', q } | { tipo:'detalle', codigo } — para "Reintentar"
let RT_BUSCAR_ABORT = null;
let RT_BUSCAR_SEQ = 0;
let RT_BUSCAR_DEBOUNCE = null;
let RT_MOV_ABORT = null;
let RT_MOV_SEQ = 0;

// Mismos colores/clases de sucursal que ya usa el resto de la app (SGEN), mapeados por
// centro de croma-api. Depósito 90/93 NO están acá — son tipo:"deposito", no sucursales.
const RT_CENTRO_CLS = {
  '0001':'s01', '0005':'s05', '0009':'s09', '0010':'s10', '0012':'s12', '0014':'s14',
};

// ── Auth ──────────────────────────────────────────────────────────────────────
function getToken() { return sessionStorage.getItem('croma_token') || localStorage.getItem('croma_token'); }
function getUser() {
  const t = getToken(); if (!t) return null;
  try {
    const p = JSON.parse(atob(t.split('.')[1].replace(/-/g,'+').replace(/_/g,'/')));
    return p.exp * 1000 < Date.now() ? null : p;
  } catch(e) { return null; }
}

(function init() {
  const hash = location.hash.slice(1);
  if (hash) {
    const token = new URLSearchParams(hash).get('token');
    if (token) { sessionStorage.setItem('croma_token', token); history.replaceState(null,'',location.pathname); }
  }
  const user = getUser();
  if (!user || user.rol !== 'admin') {
    document.getElementById('authSpinner').style.display = 'none';
    document.getElementById('authMsg').textContent = 'Sin acceso o sesión expirada.';
    document.getElementById('authFallback').style.display = 'block';
    return;
  }
  document.getElementById('authCheck').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  const u = user.usuario || '';
  document.getElementById('hUser').innerHTML = icon('user','icon-16') + ' ' + esc(u ? u.charAt(0).toUpperCase() + u.slice(1) : 'Usuario');
  setup();
})();

// ── Setup ─────────────────────────────────────────────────────────────────────
function setup() {
  document.getElementById('btnSalir').addEventListener('click', () => { location.href = HUB_URL + '?logout=1'; });
  document.getElementById('btnReset').addEventListener('click', resetApp);
  document.getElementById('btnBack').addEventListener('click', resetApp);
  document.getElementById('btnBackFromSaved').addEventListener('click', resetApp);
  document.getElementById('btnUploadNew').addEventListener('click', () => {
    document.getElementById('savedFileCard').hidden = true;
    document.getElementById('uploadZone').hidden = false;
  });
  document.getElementById('btnUseSaved').addEventListener('click', async () => {
    const saved = await dbGet(MODE).catch(() => null);
    if (!saved) { document.getElementById('savedFileCard').hidden = true; document.getElementById('uploadZone').hidden = false; return; }
    readFile(new File([saved.buffer], saved.name));
  });

  document.querySelectorAll('.mode-card').forEach(btn => {
    btn.addEventListener('click', () => selectMode(btn.dataset.mode));
  });

  document.getElementById('rtBtnVolver').addEventListener('click', resetApp);
  document.getElementById('rtBtnActualizar').addEventListener('click', () => cargarDatosRT(true));
  document.getElementById('rtTabs').addEventListener('click', e => {
    const btn = e.target.closest('.tab'); if (!btn) return;
    document.querySelectorAll('#rtTabs .tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    RT_VIEW = btn.dataset.view;
    renderRTView();
  });

  const dz = document.getElementById('uploadZone');
  const fi = document.getElementById('fileInput');
  dz.addEventListener('click', () => fi.click());
  dz.addEventListener('keydown', e => { if (e.key==='Enter'||e.key===' '){e.preventDefault();fi.click();} });
  ['dragenter','dragover'].forEach(ev => dz.addEventListener(ev, e => { e.preventDefault(); dz.classList.add('over'); }));
  ['dragleave','drop'].forEach(ev => dz.addEventListener(ev, e => { e.preventDefault(); dz.classList.remove('over'); }));
  dz.addEventListener('drop', e => { const f=e.dataTransfer.files[0]; if(f) readFile(f); });
  fi.addEventListener('change', e => { const f=e.target.files[0]; if(f) readFile(f); });

  document.getElementById('tabs').addEventListener('click', e => {
    const btn = e.target.closest('.tab'); if (!btn) return;
    document.querySelectorAll('#tabs .tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    VIEW = btn.dataset.view;
    SORT = { view:null, col:null, dir:-1 };
    renderView(getFiltered());
  });

  ['fDesde','fHasta','fRubro','fSubrubro','fMarca','fSuc','fSoloStock','fSinVentas','fExclInsumos'].forEach(id => {
    document.getElementById(id).addEventListener('change', render);
  });
  document.getElementById('fSearch').addEventListener('input', () => renderView(getFiltered()));
  document.getElementById('exportBtn').addEventListener('click', exportExcel);

  document.getElementById('panelHost').addEventListener('click', e => {
    const th = e.target.closest('th[data-sv]'); if (!th) return;
    const view=th.dataset.sv, col=th.dataset.sc;
    if (SORT.view===view&&SORT.col===col) SORT.dir*=-1; else SORT={view,col,dir:-1};
    renderView(getFiltered());
  });
}

function applyModeUI(mode) {
  const isGen = mode === 'gen';
  const dz = document.getElementById('uploadZone');
  dz.className = isGen ? '' : 'tyc-mode';
  document.getElementById('upIcon').className = isGen ? 'up-icon gen' : 'up-icon tyc';
  document.getElementById('upIcon').innerHTML = icon(isGen ? 'barChart3' : 'shirt', '');
  document.getElementById('upTitle').textContent = isGen ? 'SUBÍ TU EXCEL DE VENTAS' : 'SUBÍ TU EXCEL DE STOCK TYC';
  document.getElementById('upDesc').textContent = isGen
    ? 'Ventas generales por sucursal (.xlsx). Se procesa en tu navegador.'
    : 'Stock con talle y color por sucursal (.xlsx). Se procesa en tu navegador.';
  document.getElementById('upHint').innerHTML = isGen
    ? 'Columnas esperadas: <b>COD · PRODUCTO · MARCA · RUBRO · ULTIMO INGRESO · PRECIO · VENTA TOT · STOCK TOT · VENTA 01…14</b>'
    : 'Columnas esperadas: <b>COD · T · C · NOMBE COLOR · PRODUCTO · MARCA · RUBRO · SUBRUBRO · ULTIMO INGRESO · PRECIO · COSTO · VENTA TOT · STOCK TOT · VENTA PASEO…ROCA</b>';
}

async function selectMode(mode) {
  MODE = mode;
  document.getElementById('modeSelector').hidden = true;

  if (mode === 'rt') {
    document.getElementById('btnReset').style.display = 'inline-flex';
    document.getElementById('rtApp').hidden = false;
    iniciarModoRT();
    return;
  }

  applyModeUI(mode);
  const saved = await dbGet(mode).catch(() => null);
  if (saved) {
    const d = new Date(saved.date);
    const fmt = d.toLocaleDateString('es-AR', { day:'2-digit', month:'2-digit', year:'numeric' })
              + ' ' + d.toLocaleTimeString('es-AR', { hour:'2-digit', minute:'2-digit' });
    document.getElementById('savedFileName').textContent = saved.name;
    document.getElementById('savedFileDate').textContent = 'Guardado el ' + fmt;
    document.getElementById('savedFileCard').hidden = false;
  } else {
    document.getElementById('uploadZone').hidden = false;
  }
}

// ── IndexedDB helpers ─────────────────────────────────────────────────────────
// ── Tiempo real (croma-api) ─────────────────────────────────────────────────
// Construcción de DOM sin innerHTML sobre datos de la API. opts.html queda
// reservado solo para fragmentos estáticos (nunca usado con datos de croma-api).
function rtEl(tag, opts) {
  const e = document.createElement(tag);
  if (opts) {
    if (opts.className != null) e.className = opts.className;
    if (opts.text != null) e.textContent = opts.text;
    if (opts.html != null) e.innerHTML = opts.html;
    if (opts.attrs) Object.keys(opts.attrs).forEach(k => e.setAttribute(k, opts.attrs[k]));
  }
  return e;
}

function rtEstado(container, tipo, mensaje, onRetry) {
  if (!container) return;
  container.replaceChildren();
  if (tipo === 'ninguno') return;
  const box = rtEl('div', { className:'rt-state' });
  if (tipo === 'loading') {
    box.appendChild(rtEl('div', { className:'spinner' }));
    box.appendChild(rtEl('p', { text: mensaje || 'Cargando...' }));
  } else if (tipo === 'error') {
    box.appendChild(rtEl('p', { text: mensaje || 'Error de conexión.' }));
    if (onRetry) {
      const btn = rtEl('button', { className:'btn-sm', text:'Reintentar' });
      btn.type = 'button';
      btn.addEventListener('click', onRetry);
      box.appendChild(btn);
    }
  } else if (tipo === 'vacio') {
    box.appendChild(rtEl('p', { text: mensaje || 'Sin datos.' }));
  }
  container.appendChild(box);
}

function rtNombreCentro(centro) {
  const info = RT_CENTRO_INFO && RT_CENTRO_INFO.get(centro);
  return info ? info.nombre : centro;
}

function rtBadgeUbicacion(centro) {
  const cls = centro === '0000' ? 's00' : (RT_CENTRO_CLS[centro] || 's00');
  return rtEl('span', { className:'sb ' + cls, text: rtNombreCentro(centro) });
}

// Clasificación corregida: centro (tipo:"sucursal", incluye centro "0000"/DEPO) y
// depósito (tipo:"deposito", código numérico 90/93) son DOS tablas distintas de Sysneo
// que nunca se combinan. Solo deposito:90 es "Depósito Central (DEPO)"; centro "0000"
// muestra su nombre real de /sucursales, nunca se renombra como depósito 90.
function rtClasificarDetalle(f) {
  if (f.tipo === 'deposito') {
    if (Number(f.deposito) === 90) return { esDeposito:true, nombre:'Depósito Central (DEPO)', cls:'dep90' };
    if (Number(f.deposito) === 93) return { esDeposito:true, nombre:'Fallados', cls:'dep93' };
    return { esDeposito:true, nombre: f.nombre || ('Depósito ' + f.deposito), cls:'dep90' };
  }
  const cls = f.centro === '0000' ? 's00' : (RT_CENTRO_CLS[f.centro] || 's00');
  return { esDeposito:false, nombre: rtNombreCentro(f.centro), cls };
}

function iniciarModoRT() {
  if (!RT_LOADED && !RT_LOADING) cargarDatosRT(false);
  else renderRTView();
}

async function cargarDatosRT(forzar) {
  if (RT_LOADING) return;
  if (RT_LOADED && !forzar) { renderRTView(); return; }
  RT_LOADING = true;
  const host = document.getElementById('rtPanelHost');
  rtEstado(host, 'loading', 'Cargando stock desde Sysneo...');
  try {
    const [stockResp, sucResp] = await Promise.all([
      fetch(STOCK_API_URL + '/stock'),
      fetch(STOCK_API_URL + '/sucursales'),
    ]);
    if (!stockResp.ok) throw new Error('HTTP ' + stockResp.status + ' en /stock');
    if (!sucResp.ok) throw new Error('HTTP ' + sucResp.status + ' en /sucursales');
    const stockData = await stockResp.json();
    const sucData = await sucResp.json();
    if (!stockData.ok) throw new Error(stockData.error || 'Error de la API en /stock');
    if (!sucData.ok) throw new Error(sucData.error || 'Error de la API en /sucursales');

    RT_SUCURSALES = sucData.data || [];
    RT_CENTRO_INFO = new Map();
    RT_SUCURSALES.forEach(s => {
      RT_CENTRO_INFO.set(s.centro, {
        nombre: s.nombre, nombreSysneo: s.nombre_sysneo,
        activa: s.activa, puntoVenta: s.punto_venta,
      });
    });
    RT_STOCK = stockData.data || [];
    RT_LOADED = true;
    document.getElementById('rtUltimaActualizacion').textContent =
      'Actualizado ' + new Date().toLocaleTimeString('es-AR', { hour:'2-digit', minute:'2-digit' });
    renderRTView();
  } catch (err) {
    RT_LOADED = false;
    rtEstado(host, 'error', 'No se pudo cargar el stock desde croma-api. ' + err.message, () => cargarDatosRT(forzar));
  } finally {
    RT_LOADING = false;
  }
}

function renderRTView() {
  const host = document.getElementById('rtPanelHost');
  if (!host) return;
  if (!RT_LOADED) { rtEstado(host, 'loading', 'Cargando...'); return; }
  host.replaceChildren();
  if (RT_VIEW === 'dashboard') renderRTDashboard(host);
  else if (RT_VIEW === 'ubicaciones') renderRTUbicaciones(host);
  else if (RT_VIEW === 'stock-bajo') renderRTStockBajo(host);
  else if (RT_VIEW === 'concentrado') renderRTConcentrado(host);
  else if (RT_VIEW === 'movimientos') renderRTMovimientos(host);
  else if (RT_VIEW === 'buscador') renderRTBuscador(host);
}

function rtCalcularAgregados() {
  let stockTotal = 0, stockSucursales = 0;
  const productosConStock = new Set();
  const porCentro = new Map();
  RT_STOCK.forEach(r => {
    stockTotal += r.cantidad_stock;
    if (r.cantidad_stock > 0) productosConStock.add(r.codigo_producto);
    porCentro.set(r.centro, (porCentro.get(r.centro) || 0) + r.cantidad_stock);
  });
  porCentro.forEach((v, centro) => {
    const info = RT_CENTRO_INFO.get(centro);
    if (info && info.activa && info.puntoVenta) stockSucursales += v;
  });
  return { stockTotal, stockSucursales, productosConStock: productosConStock.size, porCentro };
}

function rtStockBajoLista() {
  return RT_STOCK.filter(r => r.cantidad_stock >= 1 && r.cantidad_stock <= 2)
    .sort((a, b) => a.cantidad_stock - b.cantidad_stock || a.codigo_producto.localeCompare(b.codigo_producto));
}

function rtConcentradoLista() {
  const porProducto = new Map();
  RT_STOCK.forEach(r => {
    if (r.cantidad_stock > 0) {
      if (!porProducto.has(r.codigo_producto)) porProducto.set(r.codigo_producto, []);
      porProducto.get(r.codigo_producto).push(r);
    }
  });
  const out = [];
  porProducto.forEach(filas => { if (filas.length === 1) out.push(filas[0]); });
  return out.sort((a, b) => b.cantidad_stock - a.cantidad_stock);
}

function rtAbrirDetalleDesdeTabla(codigo) {
  RT_VIEW = 'buscador';
  document.querySelectorAll('#rtTabs .tab').forEach(t => t.classList.toggle('active', t.dataset.view === 'buscador'));
  renderRTView();
  rtVerDetalle(codigo);
}

function rtTablaUbicacionCantidad(host, titulo, notaTexto, filas, totalReal, limite) {
  const panel = rtEl('div', { className:'panel' });
  const ph = rtEl('div', { className:'ph' });
  ph.appendChild(rtEl('h3', { text: titulo }));
  ph.appendChild(rtEl('span', { className:'pnote', text: totalReal + ' registros' }));
  panel.appendChild(ph);

  const mostrar = filas.slice(0, limite);
  if (mostrar.length === 0) {
    panel.appendChild(rtEl('div', { className:'empty', text:'Sin registros.' }));
  } else {
    const wrap = rtEl('div', { className:'scroll' });
    const table = document.createElement('table');
    const thead = document.createElement('thead');
    const trh = document.createElement('tr');
    ['Código', 'Ubicación', 'Cantidad'].forEach(t => trh.appendChild(rtEl('th', { className:'ns', text:t })));
    thead.appendChild(trh);
    table.appendChild(thead);
    const tbody = document.createElement('tbody');
    mostrar.forEach(r => {
      const tr = document.createElement('tr');
      tr.style.cursor = 'pointer';
      tr.addEventListener('click', () => rtAbrirDetalleDesdeTabla(r.codigo_producto));
      const tdCod = document.createElement('td');
      tdCod.appendChild(rtEl('span', { className:'cod', text: r.codigo_producto }));
      tr.appendChild(tdCod);
      const tdUbi = document.createElement('td');
      tdUbi.appendChild(rtBadgeUbicacion(r.centro));
      tr.appendChild(tdUbi);
      tr.appendChild(rtEl('td', { className:'nr', text: nf.format(r.cantidad_stock) }));
      tbody.appendChild(tr);
    });
    table.appendChild(tbody);
    wrap.appendChild(table);
    panel.appendChild(wrap);
    if (totalReal > limite) {
      panel.appendChild(rtEl('div', { className:'rt-note', text: 'Mostrando ' + limite + ' de ' + totalReal + ' registros. Usá el buscador para un producto puntual.' }));
    }
  }
  panel.appendChild(rtEl('div', { className:'rt-note', text: notaTexto }));
  host.appendChild(panel);
}

function renderRTStockBajo(host) {

    'Calculado a nivel producto y centro — sin desglose masivo de talle/color, sin depósito 90/93 (esa tabla no informa esos valores en bloque). Hacé click en un producto para ver el detalle real, incluyendo depósito 90 y depósito 93.',
    todas, todas.length, 200
  );
}

function renderRTConcentrado(host) {
  const todas = rtConcentradoLista();
  rtTablaUbicacionCantidad(
    host, 'Stock concentrado en centros y sucursales',
    'Productos que, dentro de lo que informa /stock, solo tienen stock en una ubicación — no es necesariamente la única ubicación de toda la empresa: podría haber stock adicional en Depósito Central (90) o Fallados (93) que esta tabla no ve. Es información de posición de stock, no de rotación.',
    todas, todas.length, 200
  );
}

function renderRTUbicaciones(host) {
  const ag = rtCalcularAgregados();
  const panel = rtEl('div', { className:'panel' });
  const ph = rtEl('div', { className:'ph' });
  ph.appendChild(rtEl('h3', { text:'Stock por ubicación' }));
  panel.appendChild(ph);

  const filas = [...ag.porCentro.entries()].map(([centro, stock]) => ({ centro, stock, info: RT_CENTRO_INFO.get(centro) }));
  filas.sort((a, b) => {
    const aComercial = a.info && a.info.puntoVenta;
    const bComercial = b.info && b.info.puntoVenta;
    if (aComercial !== bComercial) return aComercial ? -1 : 1;
    return (a.info ? a.info.nombre : a.centro).localeCompare(b.info ? b.info.nombre : b.centro);
  });

  const wrap = rtEl('div', { className:'scroll' });
  const table = document.createElement('table');
  const thead = document.createElement('thead');
  const trh = document.createElement('tr');
  ['Ubicación', 'Tipo', 'Stock'].forEach(t => trh.appendChild(rtEl('th', { className:'ns', text:t })));
  thead.appendChild(trh);
  table.appendChild(thead);
  const tbody = document.createElement('tbody');
  filas.forEach(({ centro, stock, info }) => {
    const tr = document.createElement('tr');
    const tdNom = document.createElement('td');
    tdNom.appendChild(rtBadgeUbicacion(centro));
    tr.appendChild(tdNom);
    const tdTipo = document.createElement('td');
    const esComercial = info && info.puntoVenta;
    tdTipo.appendChild(rtEl('span', { className:'tag', text: esComercial ? 'Sucursal comercial' : 'No comercial' }));
    tr.appendChild(tdTipo);
    tr.appendChild(rtEl('td', { className:'nr', text: nf.format(stock) }));
    tbody.appendChild(tr);
  });
  table.appendChild(tbody);
  wrap.appendChild(table);
  panel.appendChild(wrap);
  panel.appendChild(rtEl('div', { className:'rt-note', text:'No incluye Depósito Central 90 ni Fallados 93. Esas ubicaciones están disponibles en la consulta individual por producto (pestaña Buscador).' }));
  host.appendChild(panel);
}

function renderRTDashboard(host) {
  const ag = rtCalcularAgregados();

  function kpi(label, value, sub, hero) {
    const d = rtEl('div', { className:'kpi' + (hero ? ' hero' : '') });
    d.appendChild(rtEl('div', { className:'kl', text:label }));
    d.appendChild(rtEl('div', { className:'kv', text:value }));
    if (sub) d.appendChild(rtEl('div', { className:'ks', text:sub }));
    return d;
  }

  const kpis = rtEl('div', { className:'kpis' });
  kpis.appendChild(kpi('Stock en centros y sucursales', nf.format(ag.stockTotal), 'No incluye Depósito Central 90 ni Fallados 93', true));
  kpis.appendChild(kpi('Stock en sucursales comerciales', nf.format(ag.stockSucursales)));
  kpis.appendChild(kpi('Productos con stock', nf.format(ag.productosConStock)));
  kpis.appendChild(kpi('Registros con stock bajo (1-2u)', nf.format(rtStockBajoLista().length)));
  host.appendChild(kpis);

  host.appendChild(rtEl('p', { className:'footnote', text:'Depósito Central (90) y Fallados (93) no están incluidos en estos números — no hay un endpoint que traiga el total agregado de esas ubicaciones todavía. Se pueden consultar por producto individual en la pestaña Buscador.' }));

  const panel = rtEl('div', { className:'panel' });
  const ph = rtEl('div', { className:'ph' });
  ph.appendChild(rtEl('h3', { text:'Stock por sucursal comercial' }));
  panel.appendChild(ph);
  const pad = rtEl('div');
  pad.style.padding = '14px 18px';
  const comerciales = [...ag.porCentro.entries()]
    .filter(([c]) => { const info = RT_CENTRO_INFO.get(c); return info && info.puntoVenta; })
    .sort((a, b) => b[1] - a[1]);
  const max = Math.max(1, ...comerciales.map(([, v]) => v));
  comerciales.forEach(([centro, v]) => {
    const row = rtEl('div', { className:'mini-row' });
    row.appendChild(rtEl('div', { className:'mini-label', text: rtNombreCentro(centro) }));
    const bar = rtEl('div', { className:'mini-bar' });
    const span = rtEl('span', { className:'rt-bar-fill' });
    span.style.width = Math.round(v / max * 100) + '%';
    bar.appendChild(span);
    row.appendChild(bar);
    row.appendChild(rtEl('div', { className:'mini-val', text: nf.format(v) }));
    pad.appendChild(row);
  });
  panel.appendChild(pad);
  host.appendChild(panel);
}

function rtDedupProductos(filas) {
  const vistos = new Set(); const out = [];
  filas.forEach(f => {
    const cod = (f.codigo_producto || '').trim();
    if (!cod || vistos.has(cod)) return;
    vistos.add(cod); out.push(f);
  });
  return out;
}

function renderRTBuscador(host) {
  const wrap = rtEl('div');
  const searchBar = rtEl('div', { className:'rt-search' });
  const input = document.createElement('input');
  input.type = 'text';
  input.id = 'rtBuscarInput';
  input.placeholder = 'Buscar producto por código o nombre...';
  input.autocomplete = 'off';
  input.addEventListener('input', rtOnBuscarInput);
  searchBar.appendChild(input);
  wrap.appendChild(searchBar);

  wrap.appendChild(rtEl('div', { className:'rt-results', attrs:{ id:'rtResultados' } }));
  wrap.appendChild(rtEl('div', { attrs:{ id:'rtDetalle' } }));
  wrap.appendChild(rtEl('div', { attrs:{ id:'rtBuscarEstado' } }));
  host.appendChild(wrap);

  if (RT_BUSCAR_ULTIMA && RT_BUSCAR_ULTIMA.tipo === 'buscar') input.value = RT_BUSCAR_ULTIMA.q;
  if (!RT_BUSCAR_ULTIMA) {
    rtEstado(document.getElementById('rtBuscarEstado'), 'vacio', 'Buscá un producto por código o nombre para ver su stock.');
  } else if (RT_BUSCAR_ULTIMA.tipo === 'detalle') {
    rtVerDetalle(RT_BUSCAR_ULTIMA.codigo);
  } else if (RT_BUSCAR_ULTIMA.tipo === 'buscar') {
    rtBuscar(RT_BUSCAR_ULTIMA.q);
  }
}

function rtOnBuscarInput(e) {
  const texto = e.target.value.trim();
  clearTimeout(RT_BUSCAR_DEBOUNCE);
  if (texto.length < 2) {
    if (RT_BUSCAR_ABORT) { RT_BUSCAR_ABORT.abort(); RT_BUSCAR_ABORT = null; }
    RT_BUSCAR_ULTIMA = null;
    document.getElementById('rtResultados').replaceChildren();
    document.getElementById('rtDetalle').replaceChildren();
    rtEstado(document.getElementById('rtBuscarEstado'), 'vacio', 'Buscá un producto por código o nombre para ver su stock.');
    return;
  }
  RT_BUSCAR_DEBOUNCE = setTimeout(() => rtBuscar(texto), 350);
}

async function rtBuscar(texto) {
  RT_BUSCAR_ULTIMA = { tipo:'buscar', q: texto };
  if (RT_BUSCAR_ABORT) RT_BUSCAR_ABORT.abort();
  const miSeq = ++RT_BUSCAR_SEQ;
  const controller = new AbortController();
  RT_BUSCAR_ABORT = controller;
  document.getElementById('rtDetalle').replaceChildren();
  rtEstado(document.getElementById('rtBuscarEstado'), 'loading', 'Buscando...');
  try {
    const url = STOCK_API_URL + '/productos?q=' + encodeURIComponent(texto);
    const resp = await fetch(url, { signal: controller.signal });
    if (miSeq !== RT_BUSCAR_SEQ) return;
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const data = await resp.json();
    if (miSeq !== RT_BUSCAR_SEQ) return;
    if (!data.ok) throw new Error(data.error || 'Error de la API');
    const productos = rtDedupProductos(data.data || []);
    if (productos.length === 0) {
      document.getElementById('rtResultados').replaceChildren();
      rtEstado(document.getElementById('rtBuscarEstado'), 'vacio', 'No se encontraron productos para «' + texto + '».');
      return;
    }
    rtEstado(document.getElementById('rtBuscarEstado'), 'ninguno');
    rtRenderResultados(productos);
  } catch (err) {
    if (err.name === 'AbortError') return;
    if (miSeq !== RT_BUSCAR_SEQ) return;
    document.getElementById('rtResultados').replaceChildren();
    rtEstado(document.getElementById('rtBuscarEstado'), 'error', 'No se pudo conectar con la API de stock. ' + err.message, () => rtBuscar(texto));
  }
}

function rtRenderResultados(productos) {
  const cont = document.getElementById('rtResultados');
  cont.replaceChildren();
  productos.forEach(p => {
    const item = rtEl('button', { className:'rt-result-item' });
    item.type = 'button';
    item.appendChild(rtEl('span', { className:'rt-result-cod', text: p.codigo_producto }));
    item.appendChild(rtEl('span', { className:'rt-result-desc', text: p.descripcion || '(sin descripción)' }));
    const meta = [p.marca, p.rubro].filter(Boolean).join(' · ');
    if (meta) item.appendChild(rtEl('span', { className:'rt-result-meta', text: meta }));
    item.addEventListener('click', () => rtVerDetalle(p.codigo_producto));
    cont.appendChild(item);
  });
}

async function rtVerDetalle(codigo) {
  RT_BUSCAR_ULTIMA = { tipo:'detalle', codigo: codigo };
  if (RT_BUSCAR_ABORT) RT_BUSCAR_ABORT.abort();
  const miSeq = ++RT_BUSCAR_SEQ;
  const controller = new AbortController();
  RT_BUSCAR_ABORT = controller;
  document.getElementById('rtResultados').replaceChildren();
  rtEstado(document.getElementById('rtBuscarEstado'), 'loading', 'Cargando detalle...');
  try {
    const url = STOCK_API_URL + '/stock/producto/' + encodeURIComponent(codigo);
    const resp = await fetch(url, { signal: controller.signal });
    if (miSeq !== RT_BUSCAR_SEQ) return;
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const data = await resp.json();
    if (miSeq !== RT_BUSCAR_SEQ) return;
    if (!data.ok) throw new Error(data.error || 'Error de la API');
    rtEstado(document.getElementById('rtBuscarEstado'), 'ninguno');
    rtRenderDetalle(codigo, data.data || []);
  } catch (err) {
    if (err.name === 'AbortError') return;
    if (miSeq !== RT_BUSCAR_SEQ) return;
    document.getElementById('rtDetalle').replaceChildren();
    rtEstado(document.getElementById('rtBuscarEstado'), 'error', 'No se pudo obtener el stock de este producto. ' + err.message, () => rtVerDetalle(codigo));
  }
}

function rtRenderDetalle(codigo, filas) {
  const cont = document.getElementById('rtDetalle');
  cont.replaceChildren();
  const total = filas.reduce((acc, f) => acc + (Number(f.cantidad_stock) || 0), 0);

  const header = rtEl('div', { className:'rt-detalle-header' });
  header.appendChild(rtEl('span', { className:'rt-detalle-titulo', text:'Producto ' + codigo }));
  const totalEl = rtEl('span', { className:'rt-detalle-total' });
  totalEl.appendChild(document.createTextNode('Stock total: '));
  totalEl.appendChild(rtEl('b', { text: String(total) }));
  header.appendChild(totalEl);
  cont.appendChild(header);

  if (filas.length === 0) {
    cont.appendChild(rtEl('p', { className:'rt-result-meta', text:'Sin filas de stock para este producto.' }));
    return;
  }

  filas.forEach(f => {
    const clas = rtClasificarDetalle(f);
    const sinStock = !(Number(f.cantidad_stock) > 0);
    const fila = rtEl('div', { className:'rt-fila' + (sinStock ? ' rt-fila-sinstock' : '') });
    fila.appendChild(rtEl('span', { className:'sb ' + clas.cls, text: clas.esDeposito ? 'DEPÓSITO' : 'SUCURSAL' }));
    const info = rtEl('div', { className:'rt-fila-info' });
    info.appendChild(rtEl('span', { className:'rt-fila-nombre', text: clas.nombre }));
    const variante = [];
    if (f.talle) variante.push('Talle ' + f.talle);
    if (f.color) variante.push('Color ' + f.color);
    if (variante.length) info.appendChild(rtEl('span', { className:'rt-fila-variante', text: variante.join(' · ') }));
    fila.appendChild(info);
    fila.appendChild(rtEl('span', { className:'rt-fila-cantidad', text: String(f.cantidad_stock != null ? f.cantidad_stock : '—') }));
    cont.appendChild(fila);
  });
}

function renderRTMovimientos(host) {

async function rtCargarMovimientos() {
  const panel = document.getElementById('rtMovPanel');
  if (!panel) return;
  const suc = document.getElementById('rtMovSuc').value;
  const dias = document.getElementById('rtMovDias').value;
  const cod = document.getElementById('rtMovCod').value.trim();

  if (RT_MOV_ABORT) RT_MOV_ABORT.abort();
  const miSeq = ++RT_MOV_SEQ;
  const controller = new AbortController();
  RT_MOV_ABORT = controller;
  rtEstado(panel, 'loading', 'Cargando movimientos...');

  const params = new URLSearchParams();
  params.set('dias', dias);
  if (suc) params.set('sucursal', suc);
  if (cod) params.set('codigo', cod);

  try {
    const resp = await fetch(STOCK_API_URL + '/movimientos?' + params.toString(), { signal: controller.signal });
    if (miSeq !== RT_MOV_SEQ) return;
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const data = await resp.json();
    if (miSeq !== RT_MOV_SEQ) return;
    if (!data.ok) throw new Error(data.error || 'Error de la API');
    rtRenderMovimientos(panel, data.data || [], data.total || 0);
  } catch (err) {
    if (err.name === 'AbortError') return;
    if (miSeq !== RT_MOV_SEQ) return;
    rtEstado(panel, 'error', 'No se pudieron cargar los movimientos. ' + err.message, rtCargarMovimientos);
  }
}

function rtRenderMovimientos(panel, filas, total) {
  panel.replaceChildren();
  if (filas.length === 0) {
    panel.appendChild(rtEl('div', { className:'empty', text:'Sin movimientos en este período.' }));
    return;
  }
  const cont = rtEl('div', { className:'panel' });
  if (total === 500) {
    cont.appendChild(rtEl('div', { className:'rt-note', text:'Se alcanzó el límite de 500 movimientos. Aplicá un período, sucursal o código más específico para obtener un resultado completo.' }));
  }
  const wrap = rtEl('div', { className:'scroll' });
  const table = document.createElement('table');
  const thead = document.createElement('thead');
  const trh = document.createElement('tr');
  ['Fecha', 'Sucursal', 'Código', 'Talle', 'Color', 'Cantidad', 'Tipo (crudo)'].forEach(t => trh.appendChild(rtEl('th', { className:'ns', text:t })));
  thead.appendChild(trh);
  table.appendChild(thead);
  const tbody = document.createElement('tbody');
  filas.forEach(m => {

    tr.appendChild(rtEl('td', { text: fecha ? fmtD(fecha) : '—' }));
    const tdSuc = document.createElement('td');
    tdSuc.appendChild(rtBadgeUbicacion(m.centro));
    tr.appendChild(tdSuc);
    tr.appendChild(rtEl('td', { className:'cod', text: m.codigo_producto }));
    tr.appendChild(rtEl('td', { text: m.talle || '—' }));
    tr.appendChild(rtEl('td', { text: m.color || '—' }));
    tr.appendChild(rtEl('td', { className:'nr', text: String(m.cantidad) }));

  panel.appendChild(cont);
}

function dbOpen() {
  return new Promise((res, rej) => {
    const req = indexedDB.open('croma-analisis', 1);
    req.onupgradeneeded = e => e.target.result.createObjectStore('files');
    req.onsuccess = e => res(e.target.result);
    req.onerror = () => rej(req.error);
  });
}
async function dbSave(mode, name, buffer) {
  const db = await dbOpen();
  return new Promise((res, rej) => {
    const tx = db.transaction('files', 'readwrite');
    tx.objectStore('files').put({ name, buffer, date: new Date().toISOString() }, mode);
    tx.oncomplete = res; tx.onerror = () => rej(tx.error);
  });
}
async function dbGet(mode) {
  const db = await dbOpen();
  return new Promise((res, rej) => {
    const req = db.transaction('files').objectStore('files').get(mode);
    req.onsuccess = () => res(req.result || null);
    req.onerror = () => rej(req.error);
  });
}

// ── File reading ──────────────────────────────────────────────────────────────
function readFile(file) {
  showErr('');
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const wb = XLSX.read(new Uint8Array(e.target.result), { type:'array', cellDates:true });
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, { defval:null });
      if (!rows.length) { showErr('El archivo no tiene filas de datos.'); return; }

      const keys = Object.keys(rows[0]);
      const find = (...terms) => keys.find(k => {
        const n = norm(k); return terms.every(t => n.includes(norm(t)));
      });

      if (MODE === 'gen') {
        COLS = {
          cod:find('COD'), prod:find('PRODUCTO'), marca:find('MARCA'), rubro:find('RUBRO'),
          ing:find('INGRESO'), precio:find('PRECIO'), vt:find('VENTA','TOT'), st:find('STOCK','TOT'),
        };
        SGEN.forEach(s => { s.colKey = find('VENTA', s.key); });
        if (!COLS.vt||!COLS.st) { showErr('No encontré VENTA TOT / STOCK TOT.'); return; }
      } else {
        COLS = {
          cod:find('COD'), prod:find('PRODUCTO'), marca:find('MARCA'),
          rubro:find('RUBRO'), subrubro:find('SUBRUBRO'),
          t:find('T'), c:find('C'), color:find('NOMBE','COLOR') || find('COLOR'),
          ing:find('INGRESO'), precio:find('PRECIO'), costo:find('COSTO'),
          vt:find('VENTA','TOT'), st:find('STOCK','TOT'), depo:find('STOCK','DEPO'),
        };
        // If 'C' matches COSTO instead of color code, try narrower
        if (COLS.c === COLS.costo) COLS.c = keys.find(k => norm(k) === 'C');
        STYC.forEach(s => {
          s.colV = find('VENTA', s.colK);
          s.colS = find('STOCK', s.colK);
        });
        if (!COLS.vt||!COLS.st) { showErr('No encontré VENTA TOT / STOCK TOT.'); return; }
      }

      RAW = rows;
      const dates = rows.map(r => r[COLS.ing]).filter(d => d instanceof Date && !isNaN(d));
      REF_DATE = dates.length ? new Date(Math.max(...dates.map(d => d.getTime()))) : new Date();

      fillSelects();
      document.getElementById('fname').textContent = file.name;
      const badge = document.getElementById('modeBadge');
      badge.textContent = MODE === 'gen' ? 'General' : 'Talle y color';
      badge.className = 'mode-badge ' + MODE;
      if (MODE === 'tyc') document.getElementById('fcSubrubro').hidden = false;

      // Set tabs
      const tabs = document.getElementById('tabs');
      tabs.innerHTML = MODE === 'gen'
        ? ['dashboard','marcas','rubros','sucursales','productos','oportunidades']
            .map((v,i) => `<button class="tab${i===0?' active':''}" data-view="${v}">${
              {dashboard:'Dashboard',marcas:'Marcas',rubros:'Rubros',sucursales:'Sucursales',productos:'Productos',oportunidades:'Oportunidades'}[v]
            }</button>`).join('')
        : ['dashboard','productos','talles','colores','curva','sucursales','oportunidades']
            .map((v,i) => `<button class="tab${i===0?' active':''}" data-view="${v}">${
              {dashboard:'Dashboard',productos:'Productos',talles:'Por talle',colores:'Por color',curva:'Curva de talles',sucursales:'Sucursales',oportunidades:'Oportunidades'}[v]
            }</button>`).join('');

      VIEW = MODE === 'gen' ? 'dashboard' : 'dashboard';
      OPP_SUB = 'parado';
      SORT = { view:null, col:null, dir:-1 };
      document.getElementById('uploadZone').hidden = true;
      document.getElementById('savedFileCard').hidden = true;
      document.getElementById('dash').hidden = false;
      document.getElementById('btnReset').style.display = '';
      render();
      dbSave(MODE, file.name, e.target.result).catch(() => {});
    } catch(err) { showErr('No pude leer el archivo: ' + err.message); }
  };
  reader.readAsArrayBuffer(file);
}

function fillSelects() {
  fillSel('fRubro', COLS.rubro, 'Todos');
  fillSel('fMarca', COLS.marca, 'Todas');
  if (MODE === 'tyc' && COLS.subrubro) fillSel('fSubrubro', COLS.subrubro, 'Todos');
}
function fillSel(id, col, all) {
  const el = document.getElementById(id);
  if (!col) return;
  const vals = [...new Set(RAW.map(r => r[col]).filter(Boolean))].sort((a,b)=>String(a).localeCompare(String(b),'es'));
  el.innerHTML = `<option value="">${all}</option>` + vals.map(v=>`<option>${esc(v)}</option>`).join('');
}

// ── Filtering ─────────────────────────────────────────────────────────────────
function getFiltered() {
  const desde    = new Date(document.getElementById('fDesde').value+'T00:00:00');
  const hastaV   = document.getElementById('fHasta').value;
  const hasta    = hastaV ? new Date(hastaV+'T23:59:59') : null;
  const fRubro   = document.getElementById('fRubro').value;
  const fSub     = document.getElementById('fSubrubro').value;
  const fMarca   = document.getElementById('fMarca').value;
  const fSucKey  = document.getElementById('fSuc').value;
  const soloStk  = document.getElementById('fSoloStock').checked;
  const sinV     = document.getElementById('fSinVentas').checked;
  const exclIns  = document.getElementById('fExclInsumos').checked;
  const search   = norm(document.getElementById('fSearch').value);
  const refTime  = REF_DATE ? REF_DATE.getTime() : Date.now();

  return RAW.filter(r => {
    const d = r[COLS.ing];
    if (!(d instanceof Date)||isNaN(d)) return false;
    if (d < desde) return false;
    if (hasta && d > hasta) return false;
    if (exclIns && COLS.rubro && norm(r[COLS.rubro])==='INSUMOS') return false;
    if (fRubro && r[COLS.rubro] != fRubro) return false;
    if (fSub && COLS.subrubro && r[COLS.subrubro] != fSub) return false;
    if (fMarca && r[COLS.marca] != fMarca) return false;
    if (fSucKey) {
      if (MODE === 'gen') {
        const s = SGEN.find(s=>s.key===fSucKey);
        if (s?.colKey && num(r[s.colKey])<=0) return false;
      } else {
        const s = STYC.find(s=>s.key===fSucKey);
        if (s?.colV && num(r[s.colV])<=0) return false;
      }
    }
    if (soloStk && num(r[COLS.st])<=0) return false;
    if (sinV && num(r[COLS.vt])>0) return false;
    if (search && !norm(r[COLS.prod]).includes(search) &&
        !norm(r[COLS.cod]).includes(search) &&
        !norm(r[COLS.marca]).includes(search) &&
        !norm(r[COLS.rubro]).includes(search)) return false;
    return true;
  }).map(r => {
    const v = num(r[COLS.vt]), s = num(r[COLS.st]), precio = num(r[COLS.precio]);
    const disp = v+s, st = disp>0 ? v/disp : 0;
    const weeks = Math.max((refTime - r[COLS.ing].getTime()) / 6048e5, 1);
    const dias  = daysDiff(r[COLS.ing], REF_DATE);
    const sucV  = {};
    const SUC = MODE==='gen' ? SGEN : STYC;
    SUC.forEach(suc => {
      sucV[suc.key] = MODE==='gen'
        ? { v: suc.colKey ? num(r[suc.colKey]) : 0, s: 0 }
        : { v: suc.colV ? num(r[suc.colV]) : 0, s: suc.colS ? num(r[suc.colS]) : 0 };
    });
    const base = { cod:r[COLS.cod]??'', prod:r[COLS.prod]??'', marca:r[COLS.marca]??'—',
      rubro:r[COLS.rubro]??'—', ing:r[COLS.ing], precio, v, s, disp, st,
      fact:v*precio, ritmo:v/weeks, dias, sucV };
    if (MODE==='tyc') Object.assign(base, {
      subrubro:r[COLS.subrubro]??'', t:String(r[COLS.t]??''), c:String(r[COLS.c]??''),
      color:r[COLS.color]??'', costo:num(r[COLS.costo]),
      depo:COLS.depo?num(r[COLS.depo]):0,
    });
    return base;
  });
}

// ── Render ────────────────────────────────────────────────────────────────────
function render() {
  const d = getFiltered();
  renderKPIs(d); renderView(d);
  const ref = REF_DATE ? fmtD(REF_DATE) : '—';
  const desde = document.getElementById('fDesde').value.split('-').reverse().join('/');
  const hastaV = document.getElementById('fHasta').value;
  document.getElementById('foot').innerHTML =
    `<b>Sell-through</b> = vendidas ÷ disponible. <b>Referencia</b>: último ingreso del archivo (${ref}). ` +
    `Filtrado desde ${desde}${hastaV?' hasta '+hastaV.split('-').reverse().join('/'):''}. ` +
    (document.getElementById('fExclInsumos').checked?'Insumos excluidos.':'Insumos incluidos.');
}

function renderKPIs(d) {
  const v=d.reduce((a,r)=>a+r.v,0), s=d.reduce((a,r)=>a+r.s,0);
  const st=(v+s)>0?v/(v+s):0, fact=d.reduce((a,r)=>a+r.fact,0);
  const sinV=d.filter(r=>r.v<=0).length;
  const extra = MODE==='tyc' ? [
    { l:'Colores distintos', v:nf.format(new Set(d.map(r=>r.color).filter(Boolean)).size) },
    { l:'Talles distintos',  v:nf.format(new Set(d.filter(r=>r.t!=='99').map(r=>r.t).filter(Boolean)).size) },
  ] : [
    { l:'Facturación est.', v:money(fact), sub:'venta × precio' },
    { l:'Modelos sin venta',v:nf.format(sinV), sub:d.length?pct(sinV/d.length)+' de los modelos':'' },
  ];
  const kpis = [
    { l: MODE==='tyc'?'SKUs ingresados':'Modelos ingresados', v:nf.format(d.length) },
    { l:'Unidades vendidas', v:nf.format(v) },
    { l:'Stock actual',      v:nf.format(s) },
    { hero:true, l:'Sell-through general', v:pct(st), gauge:st, sub:`${nf.format(v)} de ${nf.format(v+s)} disponibles` },
    ...extra,
  ];
  document.getElementById('kpis').innerHTML = kpis.map(k =>
    `<div class="kpi${k.hero?' hero':''}"><div class="kl">${k.l}</div><div class="kv">${k.v}</div>${k.gauge!=null?`<div class="gauge"><span style="width:${(k.gauge*100).toFixed(1)}%"></span></div>`:''}${k.sub?`<div class="ks">${k.sub}</div>`:''}</div>`
  ).join('');
}

function renderView(d) {
  if (MODE==='gen') {
    switch(VIEW) {
      case 'dashboard':    renderDashboard(d); break;
      case 'marcas':       renderAgg(d,'marca','MARCAS'); break;
      case 'rubros':       renderAgg(d,'rubro','RUBROS'); break;
      case 'sucursales':   renderSucursales(d); break;
      case 'productos':    renderProductos(d); break;
      case 'oportunidades':renderOportunidades(d); break;
    }
  } else {
    switch(VIEW) {
      case 'dashboard':    renderDashboard(d); break;
      case 'productos':    renderTycProductos(d); break;
      case 'talles':       renderTycTalles(d); break;
      case 'colores':      renderTycColores(d); break;
      case 'curva':        renderTycCurva(d); break;
      case 'sucursales':   renderTycSucursales(d); break;
      case 'oportunidades':renderTycOportunidades(d); break;
    }
  }
}

// ── Shared: Dashboard ─────────────────────────────────────────────────────────

  const topMarcas = aggBy(d,'marca').slice(0,6);
  const topRubros = aggBy(d,'rubro').slice(0,6);
  const maxM = topMarcas[0]?.v||1, maxR = topRubros[0]?.v||1;
  const miniRows = (rows, max, color) => rows.length
    ? rows.map(r=>`<div class="mini-row"><div class="mini-label" title="${esc(r.name)}">${esc(r.name)}</div><div class="mini-bar"><span style="width:${(r.v/max*100).toFixed(1)}%;background:${color}"></span></div><div class="mini-val">${nf.format(r.v)}</div><div class="mini-pct">${pct(r.st)}</div></div>`).join('')
    : '<div class="empty">Sin datos</div>';
  const SUC = MODE==='gen' ? SGEN : STYC;
  const sucRows = SUC.map(s => ({ ...s, v:d.reduce((a,r)=>a+r.sucV[s.key].v,0) })).sort((a,b)=>b.v-a.v);

      <div class="panel"><div class="ph"><h3>TOP RUBROS</h3><span class="pnote">vendidas · sell-through</span></div><div style="padding:10px 18px 14px">${miniRows(topRubros,maxR,'#3b82f6')}</div></div>
      <div class="panel" style="grid-column:1/-1"><div class="ph"><h3>VENTAS POR SUCURSAL</h3><span class="pnote">período filtrado</span></div>
        <div style="padding:10px 18px 14px">${sucRows.map(r=>`<div class="mini-row"><span class="sb ${r.cls}" style="width:170px;flex:none">${esc(r.name)}</span><div class="mini-bar"><span style="width:${(r.v/totSuc*100).toFixed(1)}%;background:${r.color}"></span></div><div class="mini-val">${nf.format(r.v)}</div><div class="mini-pct">${pct(r.v/totSuc)}</div></div>`).join('')}</div>
      </div>
    </div>`;

// ── General views ─────────────────────────────────────────────────────────────
function aggBy(data, key) {
  const m = new Map();
  data.forEach(r => {
    const g = m.get(r[key]) || { name:r[key], modelos:0, v:0, s:0, fact:0, sinV:0 };
    g.modelos++; g.v+=r.v; g.s+=r.s; g.fact+=r.fact; if(r.v<=0)g.sinV++;
    m.set(r[key], g);
  });
  return [...m.values()].map(g=>({...g,disp:g.v+g.s,st:(g.v+g.s)>0?g.v/(g.v+g.s):0})).sort((a,b)=>b.v-a.v);
}

function renderAgg(d, key, title) {
  const rows = aggBy(d, key); sortRows(rows, key, 'v');
  document.getElementById('panelHost').innerHTML = mkPanel(title, '',
    `<div class="scroll"><table><thead><tr>
      ${th(key==='marca'?'MARCA':'RUBRO','name',key,'l')}
      ${th('MODELOS','modelos',key,'r')}${th('VENDIDAS','v',key,'r')}${th('STOCK','s',key,'r')}
      ${th('DISPONIBLE','disp',key,'r')}<th class="ns">SELL-THROUGH</th>
      ${th('FACT. EST.','fact',key,'r')}${th('SIN VENTA','sinV',key,'r')}
    </tr></thead><tbody>
      ${rows.length?rows.map(r=>`<tr><td><b>${esc(r.name)}</b></td><td class="nr">${nf.format(r.modelos)}</td><td class="nr">${nf.format(r.v)}</td><td class="nr">${nf.format(r.s)}</td><td class="nr">${nf.format(r.disp)}</td><td>${rotBar(r.v,r.s)}</td><td class="nr">${money(r.fact)}</td><td class="nr">${r.sinV?`<span style="color:var(--risk);font-weight:700">${nf.format(r.sinV)}</span>`:'<span style="color:var(--gray-400)">0</span>'}</td></tr>`).join(''):`<tr><td colspan="8" class="empty">Sin datos.</td></tr>`}
    </tbody></table></div>`);
}

function renderSucursales(d) {
  const rows = SGEN.map(suc => {
    const items=d.filter(r=>r.sucV[suc.key].v>0), v=d.reduce((a,r)=>a+r.sucV[suc.key].v,0);
    const top = k => { const m=new Map(); items.forEach(r=>m.set(r[k],(m.get(r[k])||0)+r.sucV[suc.key].v)); return [...m.entries()].sort((a,b)=>b[1]-a[1])[0]?.[0]??'—'; };
    return { ...suc, v, topRubro:top('rubro'), topMarca:top('marca'), modelos:items.length };
  }).sort((a,b)=>b.v-a.v);
  const tot=rows.reduce((a,r)=>a+r.v,0)||1;

function renderTycProductos(d) {
  // Group by COD
  const m = new Map();
  d.forEach(r => {
    const g = m.get(r.cod) || { cod:r.cod, prod:r.prod, marca:r.marca, rubro:r.rubro, ing:r.ing, precio:r.precio, v:0, s:0, fact:0, talles:new Set(), colores:new Set() };
    g.v+=r.v; g.s+=r.s; g.fact+=r.fact;
    if (r.t&&r.t!=='99') g.talles.add(r.t); if (r.color) g.colores.add(r.color);

    m.set(r.cod, g);
  });
  const rows = [...m.values()].map(g=>({...g,disp:g.v+g.s,st:(g.v+g.s)>0?g.v/(g.v+g.s):0,nTalles:g.talles.size,nColores:g.colores.size}));

  document.getElementById('panelHost').innerHTML = mkPanel('PRODUCTOS (AGRUPADO POR CÓDIGO)',
    `<button class="btn-sm" id="exportProd"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M12 4v12M12 16l-4-4M12 16l4-4"/><path d="M4 20h16"/></svg>Exportar</button>`,

    </tr></thead><tbody>
      ${rows.length?rows.slice(0,500).map(r=>`<tr><td class="cod">${esc(r.cod)}</td><td class="pname" title="${esc(r.prod)}">${esc(r.prod)}</td><td><span class="tag">${esc(r.marca)}</span></td><td class="nr">${nf.format(r.v)}</td><td class="nr">${nf.format(r.s)}</td><td class="nr">${nf.format(r.disp)}</td><td>${rotBar(r.v,r.s)}</td><td class="nr">${r.nTalles||'—'}</td><td class="nr">${r.nColores||'—'}</td></tr>`).join(''):`<tr><td colspan="9" class="empty">Sin resultados.</td></tr>`}
    </tbody></table></div>`);
  document.getElementById('exportProd')?.addEventListener('click',()=>{

}

function renderTycCurva(d) {

function renderTycOportunidades(d) {
  // Quiebre de talle: CODs que vendieron en algún talle pero lo agotaron (stock=0) mientras otros talles tienen stock
  const byCode = new Map();
  d.filter(r=>r.t&&r.t!=='99').forEach(r=>{
    if(!byCode.has(r.cod)) byCode.set(r.cod,{cod:r.cod,prod:r.prod,marca:r.marca,rubro:r.rubro,talles:[]});
    byCode.get(r.cod).talles.push({t:r.t,v:r.v,s:r.s});
  });
  const quiebre = [...byCode.values()].filter(p=>{
    const conStock=p.talles.filter(t=>t.s>0), sinStock=p.talles.filter(t=>t.s<=0&&t.v>0);
    return conStock.length>0 && sinStock.length>0;
  }).map(p=>{
    const agot=p.talles.filter(t=>t.s<=0&&t.v>0).sort((a,b)=>sizeSort(a.t,b.t));
    const hayStock=p.talles.filter(t=>t.s>0).sort((a,b)=>sizeSort(a.t,b.t));
    return {...p, agotados:agot, conStock:hayStock, vtot:p.talles.reduce((a,t)=>a+t.v,0)};
  }).sort((a,b)=>b.vtot-a.vtot);

  const sets = {
    quiebre: { data:quiebre, label:'Quiebre de talle', note:'Producto con talles agotados (vendidos, stock=0) y otros talles con stock disponible', pill:'r' },
    parado:  { data:d.filter(r=>r.v<=1&&r.s>=5).sort((a,b)=>b.s-a.s), label:'Stock parado (SKU)',  note:'SKU con ventas ≤ 1 y stock ≥ 5', pill:'r' },
    reponer: { data:d.filter(r=>r.st>=0.70&&r.s<=3).sort((a,b)=>a.s-b.s), label:'Reposición sugerida', note:'Sell-through ≥ 70% y stock ≤ 3', pill:'g' },
    exitoso: { data:d.filter(r=>r.st>=0.70).sort((a,b)=>b.st-a.st), label:'SKUs exitosos', note:'Sell-through ≥ 70%', pill:'g' },
  };

  if (!['quiebre','parado','reponer','exitoso'].includes(OPP_SUB)) OPP_SUB='quiebre';

  const subTabsHtml = `<div class="sub-tabs">${Object.entries(sets).map(([key,s])=>
    `<button class="stab${OPP_SUB===key?' active':''}" data-sub="${key}">${s.label} <span class="pill ${s.pill}">${s.data.length}</span></button>`
  ).join('')}</div>`;

  let tableHtml;
  if (OPP_SUB==='quiebre') {
    tableHtml = mkPanel('QUIEBRE DE TALLE', `<span class="pnote">${sets.quiebre.note}</span>`,
      `<div class="scroll"><table><thead><tr><th class="ns">CÓD.</th><th class="ns">PRODUCTO</th><th class="ns">MARCA</th><th class="ns" style="text-align:right">TALLES AGOTADOS</th><th class="ns">TALLES CON STOCK</th></tr></thead><tbody>
        ${quiebre.length?quiebre.slice(0,200).map(r=>`<tr>
          <td class="cod">${esc(r.cod)}</td><td class="pname">${esc(r.prod)}</td><td><span class="tag">${esc(r.marca)}</span></td>
          <td class="nr">${r.agotados.map(t=>`<span class="pill r" style="margin-left:3px">${esc(t.t)}</span>`).join('')}</td>
          <td>${r.conStock.map(t=>`<span class="pill g" style="margin-left:3px">${esc(t.t)} (${t.s})</span>`).join('')}</td>
        </tr>`).join(''):`<tr><td colspan="5" class="empty">Sin quiebres detectados.</td></tr>`}
      </tbody></table></div>`);
  } else if (OPP_SUB==='parado') {
    const cur=sets.parado.data;
    tableHtml = mkPanel('STOCK PARADO POR SKU',`<span class="pnote">${sets.parado.note}</span>`,
      `<div class="scroll"><table><thead><tr><th class="ns">CÓD.</th><th class="ns">PRODUCTO</th><th class="ns">TALLE</th><th class="ns">COLOR</th><th class="ns" style="text-align:right">VENDIDAS</th><th class="ns" style="text-align:right">STOCK</th></tr></thead><tbody>
        ${cur.length?cur.slice(0,200).map(r=>`<tr><td class="cod">${esc(r.cod)}</td><td class="pname">${esc(r.prod)}</td><td style="font-weight:700">${esc(r.t)}</td><td>${esc(r.color)}</td><td class="nr">${nf.format(r.v)}</td><td class="nr" style="color:var(--risk);font-weight:700">${nf.format(r.s)}</td></tr>`).join(''):`<tr><td colspan="6" class="empty">Sin resultados.</td></tr>`}
      </tbody></table></div>`);
  } else if (OPP_SUB==='reponer') {
    const cur=sets.reponer.data;
    tableHtml = mkPanel('REPOSICIÓN SUGERIDA',`<span class="pnote">${sets.reponer.note}</span>`,
      `<div class="scroll"><table><thead><tr><th class="ns">CÓD.</th><th class="ns">PRODUCTO</th><th class="ns">TALLE</th><th class="ns">COLOR</th><th class="ns" style="text-align:right">VENDIDAS</th><th class="ns" style="text-align:right">STOCK</th><th class="ns">SELL-THROUGH</th></tr></thead><tbody>
        ${cur.length?cur.slice(0,200).map(r=>`<tr><td class="cod">${esc(r.cod)}</td><td class="pname">${esc(r.prod)}</td><td style="font-weight:700">${esc(r.t)}</td><td>${esc(r.color)}</td><td class="nr">${nf.format(r.v)}</td><td class="nr" style="color:var(--amber);font-weight:700">${nf.format(r.s)}</td><td>${rotBar(r.v,r.s)}</td></tr>`).join(''):`<tr><td colspan="7" class="empty">Sin resultados.</td></tr>`}
      </tbody></table></div>`);
  } else {
    const cur=sets.exitoso.data;
    tableHtml = mkPanel('SKUs EXITOSOS',`<span class="pnote">${sets.exitoso.note}</span>`,
      `<div class="scroll"><table><thead><tr><th class="ns">CÓD.</th><th class="ns">PRODUCTO</th><th class="ns">TALLE</th><th class="ns">COLOR</th><th class="ns" style="text-align:right">VENDIDAS</th><th class="ns" style="text-align:right">STOCK</th><th class="ns">SELL-THROUGH</th></tr></thead><tbody>

      </tbody></table></div>`);
  }

  document.getElementById('panelHost').innerHTML = subTabsHtml + tableHtml;
  document.querySelectorAll('.stab').forEach(btn=>{
    btn.addEventListener('click',()=>{ OPP_SUB=btn.dataset.sub; SORT={view:null,col:null,dir:-1}; renderTycOportunidades(d); });
