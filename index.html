  item('Ventas', nf.format(g.ventas));
  item('Stock', nf.format(g.stock));
  item('Variantes', nf.format(g.variantes));
  wrap.appendChild(resumenGrid);

  wrap.appendChild(rtEl('h4', { text:'Distribución por ubicación', className:'rt-subtitulo' }));
  const ubicaciones = rtEl('div', { className:'rt-productos-ubicaciones' });
  const porUbicacion = RT_CENTROS.map(c => ({
    nombre: RT_CENTRO_NOMBRE[c],
    ventas: g.filas.reduce((a, f) => a + (f['Ventas_ctro_' + c] || 0), 0),
    stock: g.filas.reduce((a, f) => a + (f['Stock_ctro_' + c] || 0), 0),
  }));
  porUbicacion.push({ nombre:'Depósito Central (90 + 93)', ventas:null, stock: g.filas.reduce((a, f) => a + (f.Stock_ctro_0000 || 0), 0) });
  const maxValor = Math.max(1, ...porUbicacion.map(u => Math.max(u.ventas || 0, u.stock || 0)));
  porUbicacion.forEach(u => {
    const fila = rtEl('div', { className:'rt-ubicacion-fila' });

    fila.appendChild(rtEl('span', { className:'rt-ubicacion-valor', text:
      (u.ventas != null ? nf.format(u.ventas) + ' vta. · ' : '') + nf.format(u.stock) + ' stock' }));
    ubicaciones.appendChild(fila);
  });
  wrap.appendChild(ubicaciones);

  wrap.appendChild(rtEl('h4', { text:'Variantes (' + nf.format(g.filas.length) + ')', className:'rt-subtitulo' }));
  wrap.appendChild(rtProductosTablaVariantes(g));

  return wrap;
}

  searchInput.value = RT_PRODUCTOS_BUSQUEDA;
  // Filtra sobre los datos ya cargados -- nunca una consulta nueva por tecla. Restaura
  // foco+cursor (rtRenderVistaActual reconstruye todo #rtPanelHost en cada letra).
  searchInput.addEventListener('input', () => {

    RT_PRODUCTOS_BUSQUEDA = searchInput.value;

  const offset = RT_PRODUCTOS_PAGINA * RT_PRODUCTOS_FILAS_POR_PAGINA;

  const wrap = rtEl('div', { className:'rt-table-wrap' });

  trh.appendChild(rtProductosThOrdenable('Código', 'codigo', RT_PRODUCTOS_ORDEN, () => rtProductosOrdenarPor('codigo')));
  trh.appendChild(rtProductosThOrdenable('Producto', 'producto', RT_PRODUCTOS_ORDEN, () => rtProductosOrdenarPor('producto')));
  trh.appendChild(rtProductosThOrdenable('Marca', 'marca', RT_PRODUCTOS_ORDEN, () => rtProductosOrdenarPor('marca')));
  trh.appendChild(rtEl('th', { text:'Rubro' }));
  trh.appendChild(rtEl('th', { text:'Subrubro' }));
  trh.appendChild(rtProductosThOrdenable('Ventas', 'ventas', RT_PRODUCTOS_ORDEN, () => rtProductosOrdenarPor('ventas')));
  trh.appendChild(rtProductosThOrdenable('Stock', 'stock', RT_PRODUCTOS_ORDEN, () => rtProductosOrdenarPor('stock')));
  trh.appendChild(rtProductosThOrdenable('Variantes', 'variantes', RT_PRODUCTOS_ORDEN, () => rtProductosOrdenarPor('variantes')));

  const tbody = rtEl('tbody');

    tr.setAttribute('aria-label', (abierto ? 'Cerrar' : 'Ver') + ' detalle de ' + g.codigo + (g.producto ? ' ' + g.producto : ''));

    chevron.innerHTML = icon('chevronRight', 'icon-16'); // icono estatico del helper

    tr.appendChild(tdCodigo);
    tr.appendChild(rtEl('td', { className:'pname', text: g.producto || '—' }));
    tr.appendChild(rtEl('td', { text: g.marca || '—' }));
    tr.appendChild(rtEl('td', { text: g.rubro || '—' }));
    tr.appendChild(rtEl('td', { text: g.subrubro || '—' }));
    tr.appendChild(rtEl('td', { className:'nr', text: nf.format(g.ventas) }));
    tr.appendChild(rtEl('td', { className:'nr', text: nf.format(g.stock) }));
    tr.appendChild(rtEl('td', { className:'nr', text: nf.format(g.variantes) }));
    tr.appendChild(rtEl('td', { text: g.ultimoIngreso ? rtFmtFecha(g.ultimoIngreso) : '—' }));
    tr.addEventListener('click', () => rtProductosExpandir(g.codigo));
    tr.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); rtProductosExpandir(g.codigo); } });
    tbody.appendChild(tr);

    if (abierto) {
      const trDetalle = rtEl('tr', { className:'rt-productos-detalle-fila' });

      trDetalle.appendChild(td);

  });
  table.appendChild(tbody);
  wrap.appendChild(table);
  host.appendChild(wrap);

  const pag = rtEl('div', { className:'rt-pagination' });
  pag.appendChild(rtEl('span', { text:'Mostrando ' + (offset + 1) + '–' + Math.min(offset + RT_PRODUCTOS_FILAS_POR_PAGINA, total) + ' de ' + nf.format(total) + (total === 1 ? ' producto' : ' productos') }));
  const btnAnt = rtEl('button', { className:'btn-sm', text:'← Anterior' });
  btnAnt.type = 'button'; btnAnt.disabled = RT_PRODUCTOS_PAGINA === 0;
  btnAnt.addEventListener('click', () => { RT_PRODUCTOS_PAGINA--; rtRenderVistaActual(); });
  const btnSig = rtEl('button', { className:'btn-sm', text:'Siguiente →' });

  btnSig.addEventListener('click', () => { RT_PRODUCTOS_PAGINA++; rtRenderVistaActual(); });

function renderRTProductos(host) {
  host.appendChild(rtEl('h3', { text:'Análisis de productos', className:'rt-subtitulo' }));

  rtProductosFormulario(host);

  if (!RT_FILTRO) { rtProductosEstadoInicial(host); return; }

  // Mismo patron lazy-load-on-render que Talles y colores: si no hay cache para este
  // filtro, dispara rtCargarCompleto() (AbortController + numero de secuencia, cancela
  // la peticion anterior sola) -- PERO no reintenta solo si este mismo filtro ya fallo
  // (RT_COMPLETO_ERROR_KEY === key): sin ese chequeo, un error deja RT_COMPLETO en null
  // para siempre y cada render volveria a llamar rtCargarCompleto() -> loop infinito de
  // fetch/render (bug real encontrado y corregido durante la validacion de esta fase).
  const key = rtFiltroKey();
  const yaFalloEsteFiltro = RT_COMPLETO_ERROR_KEY === key;
  if (!RT_COMPLETO_LOADING && !yaFalloEsteFiltro && (!RT_COMPLETO || RT_COMPLETO.filtroKey !== key)) {
    rtCargarCompleto();
  }
  if (RT_COMPLETO_LOADING) {
    const box = rtEl('div', { className:'rt-progress' });
    box.appendChild(rtEl('div', { className:'spinner' }));
    box.appendChild(rtEl('span', { text: 'Cargando productos... ' + nf.format(RT_COMPLETO_PROGRESO) + ' filas' }));
    host.appendChild(box);
    return;
  }
  // rtEstado() hace container.replaceChildren() -- se le pasa un contenedor propio (no
  // "host") para no borrar el formulario/encabezado ya agregados arriba.
  if (yaFalloEsteFiltro) {
    const errHost = rtEl('div');
    rtEstado(errHost, 'error', 'No se pudieron cargar los productos. ' + RT_COMPLETO_ERROR, rtCargarCompleto);
    host.appendChild(errHost);

  }
  if (!RT_COMPLETO || RT_COMPLETO.filtroKey !== key) {
    const box = rtEl('div', { className:'rt-progress' });
    box.appendChild(rtEl('div', { className:'spinner' }));
    box.appendChild(rtEl('span', { text:'Cargando productos...' }));
    host.appendChild(box);
    return;
  }
  const filas = RT_COMPLETO.filas;
  if (!filas.length) {
    const vacioHost = rtEl('div');
    rtEstado(vacioHost, 'vacio', 'Sin productos para este filtro y período.');
    host.appendChild(vacioHost);
    return;
  }
  if (RT_COMPLETO.capado) host.appendChild(rtEl('div', { className:'alert alert-warning', text:'El filtro tiene más de ' + nf.format(RT_LIMITE_PAGINAS_COMPLETO * 500) + ' variantes — se muestra un subconjunto (tope de seguridad de rtCargarCompleto). Acotá el filtro (marca/rubro/subrubro más específico) para ver el total.' }));

  rtProductosKPIs(host, filas);
  rtProductosTabla(host, rtProductosAgrupar(filas));
}

// ── Carga controlada de TODAS las páginas del filtro (Productos, Talles y colores) ──
async function rtCargarCompleto() {
  if (!RT_FILTRO) return;
  const key = rtFiltroKey();
  if (RT_COMPLETO && RT_COMPLETO.filtroKey === key) return; // ya en cache
  if (RT_COMPLETO_LOADING) return; // ya hay una carga en curso (evita reentrancia)

  if (RT_COMPLETO_ABORT) RT_COMPLETO_ABORT.abort();
  const controller = new AbortController();
  RT_COMPLETO_ABORT = controller;
  const seq = ++RT_COMPLETO_SEQ;
  RT_COMPLETO_LOADING = true; RT_COMPLETO_ERROR = null; RT_COMPLETO_ERROR_KEY = null; RT_COMPLETO_PROGRESO = 0;
  rtRenderVistaActual();

  const filas = [];
  let offset = 0, total = null, capado = false;
  try {
    for (let pagina = 0; pagina < RT_LIMITE_PAGINAS_COMPLETO; pagina++) {
      const params = new URLSearchParams({ desde: RT_DESDE, hasta: RT_HASTA, limit: '500', offset: String(offset) });
      Object.keys(RT_FILTRO).forEach(k => params.set(k, RT_FILTRO[k]));
      const resp = await fetch(STOCK_API_URL + '/analisis/stock-ventas?' + params.toString(), { signal: controller.signal });
      const data = await resp.json();
      if (seq !== RT_COMPLETO_SEQ) return; // el filtro cambio, se descarta
      if (!resp.ok || !data.ok) throw new Error(data.error || ('HTTP ' + resp.status));
      filas.push(...data.data);
      total = data.paginacion.total;
      RT_COMPLETO_PROGRESO = filas.length;
      rtRenderVistaActual();
      offset += data.paginacion.devueltos;
      if (offset >= total || data.paginacion.devueltos === 0) break;
      if (pagina === RT_LIMITE_PAGINAS_COMPLETO - 1 && offset < total) capado = true;
    }
    if (seq !== RT_COMPLETO_SEQ) return;
    RT_COMPLETO = { filtroKey: key, filas, capado, total };
  } catch (err) {
    if (err.name === 'AbortError') return;
    if (seq !== RT_COMPLETO_SEQ) return;
    RT_COMPLETO_ERROR = err.message;
    RT_COMPLETO_ERROR_KEY = key; // marca ESTE filtro como ya intentado y fallido
  } finally {
    if (seq === RT_COMPLETO_SEQ) { RT_COMPLETO_LOADING = false; rtRenderVistaActual(); }
  }
}

function renderRTTallesColores(host) {
  host.appendChild(rtEl('h3', { text:'Talles y colores', className:'rt-subtitulo' }));
  if (!RT_FILTRO) return rtPanelSinFiltro(host, 'Talles y colores');
  rtFiltroChip(host);

  const key = rtFiltroKey();
  if (!RT_COMPLETO_LOADING && (!RT_COMPLETO || RT_COMPLETO.filtroKey !== key)) { rtCargarCompleto(); }
  if (RT_COMPLETO_LOADING || !RT_COMPLETO || RT_COMPLETO.filtroKey !== key) {
    const box = rtEl('div', { className:'rt-progress' });
    box.appendChild(rtEl('div', { className:'spinner' }));
    box.appendChild(rtEl('span', { text: 'Cargando curva completa... ' + nf.format(RT_COMPLETO_PROGRESO) + ' filas' }));
    host.appendChild(box);
    return;
  }
  if (RT_COMPLETO_ERROR) return rtEstado(host, 'error', 'No se pudo cargar la curva completa. ' + RT_COMPLETO_ERROR, rtCargarCompleto);
  const filas = RT_COMPLETO.filas;
  if (!filas.length) return rtEstado(host, 'vacio', 'Sin datos para este filtro y período.');
  if (RT_COMPLETO.capado) host.appendChild(rtEl('div', { className:'alert alert-warning', text:'El filtro tiene más de ' + nf.format(RT_LIMITE_PAGINAS_COMPLETO * 500) + ' variantes — se muestra un subconjunto. Acotá el filtro (marca/rubro/subrubro más específico) para ver el total.' }));

  const porTalle = new Map(), porColor = new Map();
  filas.forEach(f => {
    const t = porTalle.get(f.Codigo_talle) || { ventas:0, stock:0 };
    t.ventas += f.Ventas_total; t.stock += f.Stock_total;
    porTalle.set(f.Codigo_talle, t);
    const cKey = f.Codigo_color + '|' + (f.Nombre_color || '');
    const c = porColor.get(cKey) || { nombre: f.Nombre_color || f.Codigo_color, ventas:0, stock:0 };
    c.ventas += f.Ventas_total; c.stock += f.Stock_total;
    porColor.set(cKey, c);
  });

  host.appendChild(rtEl('h4', { text:'Por talle', className:'rt-subtitulo' }));
  host.appendChild(rtTabla(
    ['Talle', 'Ventas', 'Stock'],
    Array.from(porTalle.entries()).sort((a,b) => sizeSort(a[0], b[0])),
    ([talle, v]) => {
      const tr = rtEl('tr');
      tr.appendChild(rtEl('td', { text: talle }));
      tr.appendChild(rtEl('td', { text: nf.format(v.ventas) }));
      tr.appendChild(rtEl('td', { text: nf.format(v.stock) }));
      return tr;
    }
  ));

  host.appendChild(rtEl('h4', { text:'Por color', className:'rt-subtitulo' }));
  host.appendChild(rtTabla(
    ['Color', 'Ventas', 'Stock'],
    Array.from(porColor.values()).sort((a,b) => b.ventas - a.ventas),
    (v) => {
      const tr = rtEl('tr');
      tr.appendChild(rtEl('td', { text: v.nombre }));
      tr.appendChild(rtEl('td', { text: nf.format(v.ventas) }));
      tr.appendChild(rtEl('td', { text: nf.format(v.stock) }));
      return tr;
    }
  ));
}

// ── Oportunidades ─────────────────────────────────────────────────────────────
// Motor server-side a nivel producto (no variante) -- /analisis/oportunidades.
// No depende de RT_COMPLETO/rtCargarCompleto (eso sigue siendo solo de Talles y colores).
async function rtCargarOportunidades() {
  if (RT_OPORTUNIDADES_ABORT) RT_OPORTUNIDADES_ABORT.abort();
  const controller = new AbortController();
  RT_OPORTUNIDADES_ABORT = controller;
  const seq = ++RT_OPORTUNIDADES_SEQ;
  RT_OPORTUNIDADES_LOADING = true; RT_OPORTUNIDADES_ERROR = null;
  rtRenderVistaActual();
  try {
    const params = new URLSearchParams({ desde: RT_DESDE, hasta: RT_HASTA, limit: String(RT_OPORTUNIDADES_LIMITE), offset: String(RT_OPORTUNIDADES_OFFSET) });
    if (RT_FILTRO) Object.keys(RT_FILTRO).forEach(k => params.set(k, RT_FILTRO[k]));
    if (RT_OPORTUNIDADES_ESTADO) params.set('estado', RT_OPORTUNIDADES_ESTADO);
    if (RT_OPORTUNIDADES_PRIORIDAD) params.set('prioridad', RT_OPORTUNIDADES_PRIORIDAD);
    if (RT_OPORTUNIDADES_CONFIANZA) params.set('confianza', RT_OPORTUNIDADES_CONFIANZA);
    const rot = RT_OPORTUNIDADES_ROTACION;
    if (rot.origen) params.set('rotacion_origen', rot.origen);
    if (rot.destino) params.set('rotacion_destino', rot.destino);
    if (rot.ventasDestinoMin) params.set('rotacion_ventas_destino_min', rot.ventasDestinoMin);
    if (rot.stockOrigenMin) params.set('rotacion_stock_origen_min', rot.stockOrigenMin);
    if (rot.coberturaOrigenMin) params.set('rotacion_cobertura_origen_min', rot.coberturaOrigenMin);
    const resp = await fetch(STOCK_API_URL + '/analisis/oportunidades?' + params.toString(), { signal: controller.signal });
    const data = await resp.json();
    if (seq !== RT_OPORTUNIDADES_SEQ) return;
    if (!resp.ok || !data.ok) throw new Error(data.error || ('HTTP ' + resp.status));
    RT_OPORTUNIDADES = data;
  } catch (err) {
    if (err.name === 'AbortError') return;
    if (seq !== RT_OPORTUNIDADES_SEQ) return;
    RT_OPORTUNIDADES_ERROR = err.message;
  } finally {
    if (seq === RT_OPORTUNIDADES_SEQ) { RT_OPORTUNIDADES_LOADING = false; rtRenderVistaActual(); }
  }
}

function rtOportunidadesCambiarEstado(estado) {

  if (!RT_OPORTUNIDADES) return;

  rtCargarOportunidades();

  host.appendChild(tituloFiltros);
  const prioRow = rtEl('div', { className:'rt-buscador-row' });
  ['alta', 'media', 'baja'].forEach(p => {
    const btn = rtEl('button', { className:'btn-sm' + (RT_OPORTUNIDADES_PRIORIDAD === p ? ' rt-kpi-activo' : ''), text: 'Prioridad ' + p });
    btn.type = 'button';
    btn.addEventListener('click', () => { RT_OPORTUNIDADES_PRIORIDAD = (RT_OPORTUNIDADES_PRIORIDAD === p) ? null : p; RT_OPORTUNIDADES_OFFSET = 0; rtCargarOportunidades(); });
    prioRow.appendChild(btn);
  });
  host.appendChild(prioRow);

  // Revision de posible_rotacion: confianza + filtros derivados (§4). Se muestra siempre
  // que haya casos de rotacion en el resumen -- aplicar cualquiera de estos filtros acota
  // automaticamente a productos con diagnostico de rotacion (no hace falta elegir el estado a mano).
  if ((r.por_regla_cumplida.posible_rotacion || 0) > 0) {
    host.appendChild(rtEl('h4', { text:'Revisar posible rotación', className:'rt-subtitulo' }));
    const confRow = rtEl('div', { className:'rt-buscador-row' });
    [['', 'Todos'], ['alta', 'Alta confianza'], ['manual', 'Revisión manual']].forEach(([valor, etiqueta]) => {
      const btn = rtEl('button', { className:'btn-sm' + (RT_OPORTUNIDADES_CONFIANZA === valor && valor ? ' rt-kpi-activo' : (!valor && !RT_OPORTUNIDADES_CONFIANZA ? ' rt-kpi-activo' : '')), text: etiqueta });
      btn.type = 'button';
      btn.addEventListener('click', () => rtOportunidadesCambiarConfianza(valor || null));
      confRow.appendChild(btn);
    });
    host.appendChild(confRow);

    const rotRow = rtEl('div', { className:'rt-buscador-row' });
    const selOrigen = rtEl('select'); selOrigen.appendChild(rtEl('option', { attrs:{value:''}, text:'Sucursal origen' }));
    const selDestino = rtEl('select'); selDestino.appendChild(rtEl('option', { attrs:{value:''}, text:'Sucursal destino' }));
    RT_CENTROS.forEach(c => {
      selOrigen.appendChild(rtEl('option', { attrs:{value:c}, text: RT_CENTRO_NOMBRE[c] }));
      selDestino.appendChild(rtEl('option', { attrs:{value:c}, text: RT_CENTRO_NOMBRE[c] }));
    });
    selOrigen.value = RT_OPORTUNIDADES_ROTACION.origen; selDestino.value = RT_OPORTUNIDADES_ROTACION.destino;
    selOrigen.addEventListener('change', () => { RT_OPORTUNIDADES_ROTACION.origen = selOrigen.value; rtOportunidadesAplicarRotacion(); });
    selDestino.addEventListener('change', () => { RT_OPORTUNIDADES_ROTACION.destino = selDestino.value; rtOportunidadesAplicarRotacion(); });
    rotRow.appendChild(selOrigen); rotRow.appendChild(selDestino);

    const inpVentas = rtEl('input', { attrs:{ type:'number', min:'0', placeholder:'Mín. ventas destino' } });
    inpVentas.value = RT_OPORTUNIDADES_ROTACION.ventasDestinoMin;
    inpVentas.addEventListener('change', () => { RT_OPORTUNIDADES_ROTACION.ventasDestinoMin = inpVentas.value; rtOportunidadesAplicarRotacion(); });
    const inpStock = rtEl('input', { attrs:{ type:'number', min:'0', placeholder:'Mín. stock origen' } });
    inpStock.value = RT_OPORTUNIDADES_ROTACION.stockOrigenMin;
    inpStock.addEventListener('change', () => { RT_OPORTUNIDADES_ROTACION.stockOrigenMin = inpStock.value; rtOportunidadesAplicarRotacion(); });
    const inpCobertura = rtEl('input', { attrs:{ type:'number', min:'0', placeholder:'Mín. cobertura origen (días)' } });
    inpCobertura.value = RT_OPORTUNIDADES_ROTACION.coberturaOrigenMin;
    inpCobertura.addEventListener('change', () => { RT_OPORTUNIDADES_ROTACION.coberturaOrigenMin = inpCobertura.value; rtOportunidadesAplicarRotacion(); });
    rotRow.appendChild(inpVentas); rotRow.appendChild(inpStock); rotRow.appendChild(inpCobertura);
    host.appendChild(rotRow);
  }

  if (RT_OPORTUNIDADES_LOADING) {
    const box = rtEl('div', { className:'rt-progress' });
    box.appendChild(rtEl('div', { className:'spinner' }));
    box.appendChild(rtEl('span', { text:'Actualizando...' }));
    host.appendChild(box);
    return;
  }

  const datos = RT_OPORTUNIDADES.data;
  if (!datos.length) return rtEstado(host, 'vacio', 'Sin oportunidades para este filtro y período.');

  // Tabla (desktop) -- reutiliza rtTabla()
  const tablaWrap = rtEl('div', { className:'rt-oportunidades-tabla' });
  tablaWrap.appendChild(rtTabla(
    ['Estado', 'Código', 'Producto', 'Marca', 'Ventas', 'Stock sucursales', 'Depósito 90', 'Cobertura (días)', 'Motivo'],
    datos,
    (f) => {
      const tr = rtEl('tr', { className:'rt-row-click' });
      const tdEstado = rtEl('td');
      tdEstado.appendChild(rtBadgeEstado(f.estado_principal, f.texto_estado));
      if (f.estados_secundarios.length) tdEstado.appendChild(rtBadgesSecundarios(f.estados_secundarios));
      tr.appendChild(tdEstado);
      tr.appendChild(rtEl('td', { text: f.Codigo_producto }));
      tr.appendChild(rtEl('td', { text: f.Nombre_producto }));
      tr.appendChild(rtEl('td', { text: f.Nombre_marca }));
      tr.appendChild(rtEl('td', { text: nf.format(f.Ventas_total) + (f.devoluciones_netas ? ' (con devol.)' : '') }));
      tr.appendChild(rtEl('td', { text: nf.format(f.Stock_sucursales) }));
      tr.appendChild(rtEl('td', { text: nf.format(f.Stock_ctro_0000) }));
      tr.appendChild(rtEl('td', { text: f.cobertura_estado === 'sin_ventas' ? 'sin ventas' : nf1.format(f.cobertura_dias) }));
      const tdMotivo = rtEl('td', { text: f.motivo || '—' });
      if (f.diagnostico_rotacion) {
        const ps = f.diagnostico_rotacion.par_sugerido;
        tdMotivo.appendChild(rtEl('div', { className:'rt-note', text: 'Origen ' + ps.origen.sucursal + ' (stock ' + ps.origen.stock + ') → Destino ' + ps.destino.sucursal + ' (ventas ' + ps.destino.ventas + ')' + (ps.cantidad_sugerida ? ' · sugerido: ' + ps.cantidad_sugerida + ' un.' : '') }));
      }
      tr.appendChild(tdMotivo);
      tr.addEventListener('click', () => rtOportunidadesVerDetalle(f.Codigo_producto));
      return tr;
    }
  ));
  host.appendChild(tablaWrap);

  // Tarjetas (mobile) -- mismo dato, distinta presentacion, activada por CSS (.rt-oportunidades-tabla se
  // oculta y .rt-oportunidades-cards se muestra por debajo de 640px, ver <style>)
  const cardsWrap = rtEl('div', { className:'rt-oportunidades-cards' });
  datos.forEach(f => {
    const card = rtEl('div', { className:'card rt-opp-card' });
    card.appendChild(rtBadgeEstado(f.estado_principal, f.texto_estado));
    if (f.estados_secundarios.length) card.appendChild(rtBadgesSecundarios(f.estados_secundarios));
    card.appendChild(rtEl('div', { className:'rt-opp-card-titulo', text: f.Codigo_producto + ' · ' + f.Nombre_producto }));
    card.appendChild(rtEl('div', { className:'rt-opp-card-linea', text: f.Nombre_marca }));
    card.appendChild(rtEl('div', { className:'rt-opp-card-linea', text: 'Ventas ' + nf.format(f.Ventas_total) + ' · Stock ' + nf.format(f.Stock_sucursales) + ' (+' + nf.format(f.Stock_ctro_0000) + ' depósito 90)' }));
    if (f.motivo) card.appendChild(rtEl('div', { className:'rt-opp-card-motivo', text: f.motivo }));
    if (f.diagnostico_rotacion) {
      const ps = f.diagnostico_rotacion.par_sugerido;
      card.appendChild(rtEl('div', { className:'rt-opp-card-motivo', text: 'Origen ' + ps.origen.sucursal + ' (stock ' + ps.origen.stock + ') → Destino ' + ps.destino.sucursal + ' (ventas ' + ps.destino.ventas + ')' + (ps.cantidad_sugerida ? ' · sugerido: ' + ps.cantidad_sugerida + ' un.' : '') }));
    }
    card.style.cursor = 'pointer';
    card.addEventListener('click', () => rtOportunidadesVerDetalle(f.Codigo_producto));
    cardsWrap.appendChild(card);
  });
  host.appendChild(cardsWrap);

  const p = RT_OPORTUNIDADES.paginacion;
  const pag = rtEl('div', { className:'rt-pagination' });
  pag.appendChild(rtEl('span', { text: 'Mostrando ' + (p.total === 0 ? 0 : p.offset + 1) + '–' + (p.offset + p.devueltos) + ' de ' + nf.format(p.total) }));
  const btnAnt = rtEl('button', { className:'btn-sm', text:'← Anterior' });
  btnAnt.type = 'button'; btnAnt.disabled = p.offset === 0;
  btnAnt.addEventListener('click', () => rtOportunidadesPagina(-1));
  const btnSig = rtEl('button', { className:'btn-sm', text:'Siguiente →' });
  btnSig.type = 'button'; btnSig.disabled = (p.offset + p.devueltos) >= p.total;
  btnSig.addEventListener('click', () => rtOportunidadesPagina(1));
  pag.appendChild(btnAnt); pag.appendChild(btnSig);
  host.appendChild(pag);
}

</script>
</body>
</html>
